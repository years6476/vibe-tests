<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends – Insight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAFAFC;
    --surface: #FFFFFF;
    --accent: #5B5FEF;
    --accent-soft: #ECEBFF;
    --text-dark: #1A1B25;
    --text-muted: #6B7280;
    --border: #ECEDF2;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ background: #FFFFFF; }

  body{
    background: #FFFFFF;
    font-family: 'Inter', sans-serif;
    color: var(--text-dark);
    display:flex;
    justify-content:center;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .app{
    width:100%;
    max-width: 480px;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--surface);
    box-shadow: 0 0 24px rgba(0,0,0,0.04);
  }

  /* ---------- Header ---------- */
  .top-header{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap: 14px;
    padding: 18px 20px 4px 20px;
    position: sticky;
    top:0;
    background: var(--surface);
    z-index: 10;
  }

  .back-btn{
    width:auto; height:auto; border:none; background: transparent;
    display:flex; align-items:center; justify-content:center;
    padding: 4px; cursor:pointer;
    transition: opacity 0.2s ease, transform 0.15s ease;
  }
  .back-btn:hover{ opacity: 0.6; }
  .back-btn:active{ transform: scale(0.9); }
  .back-btn svg{ width:22px; height:22px; stroke: var(--text-dark); }

  .header-title{
    font-family: 'Poppins', sans-serif;
    font-size: 19px; font-weight: 400; letter-spacing: 0.2px;
  }

  /* ---------- Tabs ---------- */
  .friend-tabs{
    display:flex; align-items:center; gap: 9px;
    padding: 0 14px 8px 14px;
    overflow-x: auto; scrollbar-width: none;
  }
  .friend-tabs::-webkit-scrollbar{ display:none; }

  .tab-item{
    flex: 0 0 auto; border:none;
    border-bottom: 2px solid transparent; background: transparent;
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
    color: var(--text-muted); padding: 8px 10px; cursor:pointer;
    white-space: nowrap;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .tab-item:hover{ color: var(--text-dark); }
  .tab-item.active{ color: var(--accent); border-bottom: 2px solid var(--accent); }

  /* ---------- Search ---------- */
  .search-wrapper{
    display:flex; align-items:center; justify-content: space-between;
    gap: 10px; padding: 12px 14px 18px 14px;
  }

  .search-box{
    display:flex; align-items:center; gap: 10px;
    width: 85%; background: #F2F3F7; border-radius: 24px; padding: 9px 16px;
  }
  .search-box.full-width{ width: 100%; }
  .search-box svg{ width:27px; height:18px; stroke: var(--text-muted); flex-shrink:0; }
  .search-box input{
    border:none; outline:none; background:transparent; width:100%;
    font-family:'Inter', sans-serif; font-size: 13px; color: var(--text-dark);
  }
  .search-box input::placeholder{ color: var(--text-muted); }

  .filter-btn{
    flex-shrink:0; width:36px; height:36px; border-radius:50%;
    background: var(--accent-soft); border:none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: background 0.2s ease, transform 0.15s ease;
  }
  .filter-btn:hover{ background:#DEDCFF; }
  .filter-btn:active{ transform: scale(0.92); }
  .filter-btn svg{ width:17px; height:17px; stroke: var(--accent); }

  /* ---------- Filter Bottom Sheet ---------- */
  .sheet-overlay{
    position:fixed; inset:0; background: rgba(15,15,20,0.45);
    opacity:0; visibility:hidden; display:flex; justify-content:center;
    transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 100;
  }
  .sheet-overlay.show{ opacity:1; visibility:visible; }

  .bottom-sheet{
    position:fixed; bottom:0; left:50%; width:100%; max-width:480px;
    height: 90vh; background: var(--surface); border-radius: 22px 22px 0 0;
    padding: 6px 22px 26px 22px; display:flex; flex-direction:column;
    overflow-y:auto; transform: translate(-50%, 100%);
    transition: transform 0.32s ease;
  }
  .sheet-overlay.show .bottom-sheet{ transform: translate(-50%, 0); }

  .sheet-handle{
    width:36px; height:4px; border-radius:4px; background:#E3E4EA;
    margin: 4px auto 10px auto;
  }

  .sheet-header{
    display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 14px;
  }
  .sheet-title{ font-family:'Poppins', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-dark); }
  .sheet-reset{ font-size: 12px; font-weight: 600; color: var(--accent); cursor:pointer; background:none; border:none; }

  .sheet-section{ margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .sheet-section:last-of-type{ border-bottom: none; }
  .sheet-label{ margin-bottom: 8px; }
  .sheet-label.small{ font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .sheet-label.big{ font-size: 13px; font-weight: 600; color: var(--text-dark); }

  .option-list{ display:flex; flex-direction:column; gap: 6px; }

  .option-item{
    display:flex; align-items:center; justify-content:space-between;
    width:100%; gap: 12px; background:none; border:none; padding:0;
    cursor:pointer; font-family:'Inter', sans-serif; font-size: 13.5px;
    font-weight:500; color: var(--text-dark); text-align:left;
  }
  .option-left{ display:flex; align-items:center; gap: 12px; }

  .opt-icon{
    width:16px; height:16px; flex-shrink:0; stroke: var(--text-muted); fill:none;
    transition: stroke 0.15s ease;
  }
  .opt-icon.filled{ fill: var(--text-muted); stroke:none; transition: fill 0.15s ease; }
  .opt-icon.online{ fill: #22C55E; }
  .option-item.active .opt-icon.online{ fill: #22C55E; }

  .icon-bg{
    width:26px; height:26px; border-radius:50%; background: #F2F3F7;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }

  .radio{ width:18px; height:18px; flex-shrink:0; }
  .radio .ring{ stroke: var(--text-muted); fill:none; transition: stroke 0.15s ease; }
  .radio .dot{ fill: transparent; transition: fill 0.15s ease; }

  .option-item.active .opt-icon{ stroke: var(--accent); }
  .option-item.active .opt-icon.filled{ fill: var(--accent); }
  .option-item.active .radio .ring{ stroke: var(--accent); }
  .option-item.active .radio .dot{ fill: var(--accent); }
  .option-item.active span{ color: var(--accent); font-weight:600; }

  .apply-btn{
    position: sticky; bottom: 0; width:100%; margin-top: 10px; padding: 10px 0;
    background: var(--accent); color: #FFFFFF; border:none; border-radius: 14px;
    font-family:'Inter', sans-serif; font-size: 14.5px; font-weight:600;
    cursor:pointer; transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .apply-btn:hover{ opacity:0.92; }
  .apply-btn:active{ transform: scale(0.98); }

  /* ---------- Friend Suggestion ---------- */
  .suggestion-section{ padding: 0 14px 20px 14px; }
  .suggestion-label{ font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 12px; }

  .suggestion-scroll{ overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .suggestion-scroll::-webkit-scrollbar{ display:none; }

  .suggestion-grid{ display:flex; flex-wrap: nowrap; gap: 10px; }

  .suggestion-card{
    flex: 0 0 calc((100% - 30px) / 3.5); min-width: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 8px 8px 8px; display:flex; flex-direction:column; align-items:center; text-align:center;
  }

  .suggestion-avatar{
    width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
    background: #ECEDF2; margin-bottom: 6px;
  }
  .suggestion-name{
    font-family:'Inter', sans-serif; font-size: 11.5px; font-weight: 600; color: var(--text-dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; margin-bottom: 2px;
  }
  .suggestion-username{
    font-family:'Inter', sans-serif; font-size: 10px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; margin-bottom: 6px;
  }

  .btn-add-friend{
    width:100%; background: var(--accent); color:#FFFFFF; border:none; border-radius: 7px;
    font-family:'Inter', sans-serif; font-size: 10.5px; font-weight:600;
    padding: 5px 0; margin-bottom: 4px; cursor:pointer; transition: opacity 0.15s ease;
  }
  .btn-add-friend:hover{ opacity:0.88; }
  .btn-add-friend:disabled{ opacity:0.6; cursor:default; }

  .btn-remove{
    width:100%; background: #F2F3F7; color: var(--text-muted); border:none; border-radius: 7px;
    font-family:'Inter', sans-serif; font-size: 10.5px; font-weight:600;
    padding: 5px 0; cursor:pointer; transition: background 0.15s ease;
  }
  .btn-remove:hover{ background:#E7E8EE; }

  /* ---------- All Friends List ---------- */
  .friendlist-section{ padding: 4px 14px 24px 14px; }

  .friendlist-header{
    font-family:'Poppins', sans-serif; font-size: 15px; font-weight: 500;
    color: var(--text-dark); margin-bottom: 14px;
  }
  .friendlist-count{ font-family:'Inter', sans-serif; font-weight: 500; color: var(--text-muted); font-size: 13px; }

  .friend-row{
    display:flex; align-items:center; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
  }
  .friend-row:last-child{ border-bottom: none; }

  .friend-avatar{
    width:46px; height:46px; border-radius:50%; object-fit:cover; background:#ECEDF2; flex-shrink:0;
  }
  .friend-info{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .friend-name{
    font-family:'Inter', sans-serif; font-size: 12.5px; font-weight: 600; color: var(--text-dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .friend-status{ font-family:'Inter', sans-serif; font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
  .friend-status.online{ color: #22C55E; font-weight: 400; }

  .btn-message{
    flex-shrink:0; background: transparent;
    border: 1.4px solid rgba(91,95,239,0.35); color: var(--accent); border-radius: 20px;
    font-family:'Inter', sans-serif; font-size: 11.5px; font-weight: 600;
    padding: 7px 15px; cursor:pointer; transition: background 0.15s ease;
  }
  .btn-message:hover{ background: var(--accent-soft); }

  .btn-more{
    flex-shrink:0; width:30px; height:30px; border:none; background:transparent;
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: background 0.15s ease;
  }
  .btn-more:hover{ background:#F2F3F7; }
  .btn-more svg{ width:18px; height:18px; fill: var(--text-muted); }

  .btn-accept-request{
    flex-shrink:0; background: var(--accent); color:#FFFFFF; border:none;
    border-radius: 18px; font-family:'Inter', sans-serif; font-size: 10px; font-weight: 600;
    padding: 7px 11px; cursor:pointer; white-space:nowrap; transition: opacity 0.15s ease;
  }
  .btn-accept-request:hover{ opacity:0.88; }

  .btn-remove-request{
    flex-shrink:0; background: #F2F3F7; color: var(--text-muted); border:none;
    border-radius: 18px; font-family:'Inter', sans-serif; font-size: 10px; font-weight: 600;
    padding: 7px 11px; cursor:pointer; white-space:nowrap; transition: background 0.15s ease;
  }
  .btn-remove-request:hover{ background:#E7E8EE; }

  .no-results{
    text-align:center; font-family:'Inter', sans-serif; font-size: 12.5px;
    color: var(--text-muted); padding: 30px 0;
  }

  .suggestion-grid-wrap{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .btn-unblock{
    flex-shrink:0; background: var(--accent); color:#FFFFFF; border:none;
    border-radius: 18px; font-family:'Inter', sans-serif; font-size: 11px; font-weight: 600;
    padding: 8px 16px; cursor:pointer; white-space:nowrap; transition: opacity 0.15s ease;
  }
  .btn-unblock:hover{ opacity:0.88; }

  /* ---------- More Options Menu ---------- */
  .more-menu{
    position: fixed; display:none; flex-direction:column; min-width: 150px;
    background: var(--surface); border-radius: 12px; padding: 6px;
    box-shadow: 0 6px 24px rgba(15,15,20,0.16); z-index: 200;
  }
  .more-menu.show{ display:flex; }

  .more-menu-item{
    display:flex; align-items:center; gap: 10px; width:100%; background:none; border:none;
    padding: 10px 12px; border-radius: 8px; font-family:'Inter', sans-serif;
    font-size: 13px; font-weight: 500; color: var(--text-dark); cursor:pointer; text-align:left;
  }
  .more-menu-item:hover{ background: #F2F3F7; }
  .more-menu-item svg{ width:17px; height:17px; stroke: var(--text-muted); flex-shrink:0; }
  .more-menu-item.danger{ color: #EF4444; }
  .more-menu-item.danger svg{ stroke: #EF4444; }

  /* ---------- Toast ---------- */
  .toast{
    position: fixed; bottom: 26px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #1A1B25; color: #FFFFFF; padding: 11px 18px; border-radius: 10px;
    font-family:'Inter', sans-serif; font-size: 12.5px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 300; max-width: 85%; text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Loading Skeleton ---------- */
  .skeleton-row{
    display:flex; align-items:center; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    animation: shimmer 1.4s ease-in-out infinite;
  }
  .skeleton-avatar{
    width:46px; height:46px; border-radius:50%; background: #ECEDF2; flex-shrink:0;
  }
  .skeleton-info{ flex:1; display:flex; flex-direction:column; gap:6px; }
  .skeleton-line{ height:12px; border-radius:6px; background:#ECEDF2; }
  .skeleton-line.w60{ width:60%; }
  .skeleton-line.w40{ width:40%; }
  .skeleton-btn{ width:72px; height:32px; border-radius:20px; background:#ECEDF2; flex-shrink:0; }

  @keyframes shimmer{
    0%{ opacity:1; } 50%{ opacity:0.45; } 100%{ opacity:1; }
  }

  /* ---------- Skeleton suggestion card ---------- */
  .skeleton-card{
    flex: 0 0 calc((100% - 30px) / 3.5); min-width:0;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 8px 8px 8px; display:flex; flex-direction:column;
    align-items:center; gap:6px;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  .skeleton-circle{ width:40px; height:40px; border-radius:50%; background:#ECEDF2; }
  .skeleton-text{ height:10px; border-radius:5px; background:#ECEDF2; }
  .skeleton-text.w70{ width:70%; }
  .skeleton-text.w50{ width:50%; }
  .skeleton-smbtn{ width:100%; height:26px; border-radius:7px; background:#ECEDF2; }

  /* ---------- Grid View mode for All Friends list ---------- */
  #allFriendsList.grid-mode{
    display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  #allFriendsList.grid-mode .friend-row{
    position: relative; flex-direction: column; align-items: center;
    text-align: center; gap: 4px; border: 1px solid var(--border);
    border-bottom: 1px solid var(--border); border-radius: 10px;
    padding: 16px 10px 14px 10px;
  }
  #allFriendsList.grid-mode .friend-avatar{ width: 52px; height: 52px; margin-bottom: 4px; }
  #allFriendsList.grid-mode .friend-info{ align-items: center; }
  #allFriendsList.grid-mode .friend-name{ white-space: normal; text-align:center; }
  #allFriendsList.grid-mode .btn-message{ width: 100%; margin-top: 8px; }
  #allFriendsList.grid-mode .btn-more{ position: absolute; top: 8px; right: 8px; }

  /* ---------- Auth Gate ---------- */
  .auth-gate{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 60px 20px; gap: 12px; text-align:center;
  }
  .auth-gate p{ font-size:14px; color:var(--text-muted); }
  .auth-gate a{
    color:var(--accent); font-weight:600; font-size:14px; text-decoration:none;
  }
</style>
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="top-header">
      <button class="back-btn" aria-label="পেছনে যান" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
      <h1 class="header-title">Friends</h1>
    </header>

    <!-- Tabs -->
    <nav class="friend-tabs">
      <button class="tab-item active" data-tab="all">All Friend</button>
      <button class="tab-item" data-tab="request">Requests</button>
      <button class="tab-item" data-tab="suggested">Suggestions</button>
      <button class="tab-item" data-tab="blocked">Blocked</button>
    </nav>

    <!-- Search -->
    <div class="search-wrapper">
      <div class="search-box" id="searchBox">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search Friend">
      </div>
      <button class="filter-btn" id="filterBtn" aria-label="ফিল্টার">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="8" x2="20" y2="8"/>
          <circle cx="15" cy="8" r="2.5" fill="var(--accent-soft)"/>
          <line x1="4" y1="16" x2="20" y2="16"/>
          <circle cx="9" cy="16" r="2.5" fill="var(--accent-soft)"/>
        </svg>
      </button>
    </div>

    <!-- ===== All Friend Tab Panel ===== -->
    <div id="tab-all-panel">

      <!-- Friend Suggestion (horizontal scroll) -->
      <div class="suggestion-section">
        <p class="suggestion-label">Friend Suggestion</p>
        <div class="suggestion-scroll">
          <div class="suggestion-grid" id="homeSuggestionGrid">
            <!-- Firebase থেকে লোড হবে -->
            <div class="skeleton-card"><div class="skeleton-circle"></div><div class="skeleton-text w70"></div><div class="skeleton-text w50"></div><div class="skeleton-smbtn"></div></div>
            <div class="skeleton-card"><div class="skeleton-circle"></div><div class="skeleton-text w70"></div><div class="skeleton-text w50"></div><div class="skeleton-smbtn"></div></div>
            <div class="skeleton-card"><div class="skeleton-circle"></div><div class="skeleton-text w70"></div><div class="skeleton-text w50"></div><div class="skeleton-smbtn"></div></div>
          </div>
        </div>
      </div>

      <!-- All Friends List -->
      <div class="friendlist-section">
        <p class="friendlist-header">All Friends <span class="friendlist-count">(<span id="allFriendsCount">0</span>)</span></p>
        <div id="allFriendsList">
          <!-- Skeleton -->
          <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-info"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div><div class="skeleton-btn"></div></div>
          <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-info"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div><div class="skeleton-btn"></div></div>
          <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-info"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div><div class="skeleton-btn"></div></div>
        </div>
        <p class="no-results" id="noFriendResults" style="display:none;">কোনো বন্ধু পাওয়া যায়নি</p>
      </div>
    </div>
    <!-- ===== End All Friend Tab Panel ===== -->

    <!-- ===== Requests Tab Panel ===== -->
    <div id="tab-requests-panel" style="display:none;">
      <div class="friendlist-section">
        <p class="friendlist-header">Friend Requests <span class="friendlist-count">(<span id="requestCount">0</span>)</span></p>
        <div id="requestList">
          <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-info"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div><div class="skeleton-btn"></div></div>

  <div class="toast" id="demoToast"></div>

<script type="module">
import { auth, db } from "./config.js";
import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
import {
  ref, get, set, remove, push, serverTimestamp, onValue, query, orderByChild, equalTo
} from "https://www.gstatic.com/firebasejs/11.8.1/firebase-database.js";

// ─── Toast helper ────────────────────────────────────────────
function showToast(msg, duration = 2200) {
  const toast = document.getElementById('demoToast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), duration);
}

// ─── DOM refs ─────────────────────────────────────────────────
const tabs         = document.querySelectorAll('.tab-item');
const tabPanels    = {
  all:       document.getElementById('tab-all-panel'),
  request:   document.getElementById('tab-requests-panel'),
  suggested: document.getElementById('tab-suggested-panel'),
  blocked:   document.getElementById('tab-blocked-panel')
};
const filterBtn         = document.getElementById('filterBtn');
const sheetOverlay      = document.getElementById('sheetOverlay');
const searchInput       = document.getElementById('searchInput');
const searchBox         = document.getElementById('searchBox');
const moreMenu          = document.getElementById('moreMenu');
const allFriendsList    = document.getElementById('allFriendsList');
const allFriendsCountEl = document.getElementById('allFriendsCount');
const noFriendResults   = document.getElementById('noFriendResults');
const requestList       = document.getElementById('requestList');
const requestCountEl    = document.getElementById('requestCount');
const noRequestResults  = document.getElementById('noRequestResults');
const suggestionGridWrap= document.getElementById('suggestionGridWrap');
const homeSuggestionGrid= document.getElementById('homeSuggestionGrid');
const noSuggestionResults = document.getElementById('noSuggestionResults');
const blockedList       = document.getElementById('blockedList');
const blockedCountEl    = document.getElementById('blockedCount');
const noBlockedResults  = document.getElementById('noBlockedResults');

// ─── State ───────────────────────────────────────────────────
let currentUid      = null;
let currentShowFilter = 'all';
let currentMoreRow  = null;

// friendsData[uid] = { uid, name, username, avatar, online, addedAt, interactions, mutual }
let friendsData = [];
// sentRequests = Set of uids we've already sent request to (UI-level dedup)
let sentRequests = new Set();

// ─── Default avatar ──────────────────────────────────────────
const DEFAULT_AVATAR = "https://ui-avatars.com/api/?background=5B5FEF&color=fff&size=80&bold=true&name=";

function avatarFor(name, photoURL) {
  /* FIX: photoURL ফাঁকা থাকলে initials avatar দেখাও */
  if (photoURL && photoURL.trim()) return photoURL.trim();
  return `${DEFAULT_AVATAR}${encodeURIComponent(name || '?')}`;
}

// ─── Relative time ───────────────────────────────────────────
function relTime(ts) {
  if (!ts) return 'অনেক দিন আগে';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1)  return 'এইমাত্র';
  if (m < 60) return `${m} মিনিট আগে`;
  if (h < 24) return `${h} ঘণ্টা আগে`;
  if (d < 7)  return `${d} দিন আগে`;
  const w = Math.floor(d / 7);
  return `${w} সপ্তাহ আগে`;
}

// ─── Fetch single profile ─────────────────────────────────────
async function fetchProfile(uid) {
  const snap = await get(ref(db, `users/${uid}`));
  if (!snap.exists()) return null;
  const d = snap.val();
  /* FIX: photoURL / avatar / photo — যেকোনো field থেকে ছবি নাও */
  const resolvedPhoto = d.photoURL || d.avatar || d.photo || '';
  return { uid, ...d, photoURL: resolvedPhoto };
}

// ─── Auth gate ───────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  if (!user) {
    // সব স্কেলেটন সরিয়ে auth message দেখাও
    allFriendsList.innerHTML = '<div class="auth-gate"><p>বন্ধু দেখতে <a href="./index-1.html">লগইন</a> করুন।</p></div>';
    requestList.innerHTML = '';
    blockedList.innerHTML = '';
    suggestionGridWrap.innerHTML = '';
    homeSuggestionGrid.innerHTML = '';
    return;
  }
  currentUid = user.uid;
  loadAll();
});

// ─── Load everything ─────────────────────────────────────────
async function loadAll() {
  await Promise.all([
    loadFriends(),
    loadRequests(),
    loadBlocked(),
    loadSuggestions()
  ]);
}

// ─────────────────────────────────────────────────────────────
// 1. FRIENDS  (friends/<uid>/<friendUid> = { addedAt })
// ─────────────────────────────────────────────────────────────
async function loadFriends() {
  const snap = await get(ref(db, `friends/${currentUid}`));
  allFriendsList.innerHTML = '';
  friendsData = [];

  if (!snap.exists()) {
    noFriendResults.style.display = '';
    allFriendsCountEl.textContent = '0';
    return;
  }

  const entries = Object.entries(snap.val()); // [[uid, {addedAt}], ...]
  const profiles = await Promise.all(entries.map(([uid]) => fetchProfile(uid)));

  entries.forEach(([uid, meta], i) => {
    const p = profiles[i];
    if (!p) return;

    const isOnline  = !!p.online;
    const addedAt   = meta.addedAt || 0;
    const obj = {
      uid,
      name:         p.displayName || p.name || p.username || 'Unknown',
      username:     p.username ? `@${p.username}` : '',
      avatar:       avatarFor(p.displayName || p.name || p.username, p.photoURL || p.avatar || p.photo),
      online:       isOnline,
      active:       isOnline || (Date.now() - (p.lastSeen || 0) < 86400000),
      addedAt,
      interactions: p.interactions || 0,
      mutual:       p.mutual || 0,
      lastSeen:     p.lastSeen || 0
    };
    friendsData.push(obj);
  });

  renderFriends(friendsData);
  allFriendsCountEl.textContent = friendsData.length;
  noFriendResults.style.display = friendsData.length === 0 ? '' : 'none';
}

function renderFriends(list) {
  allFriendsList.innerHTML = '';
  if (list.length === 0) { noFriendResults.style.display = ''; return; }
  noFriendResults.style.display = 'none';

  list.forEach(f => {
    const statusText = f.online
      ? '<p class="friend-status online">Online</p>'
      : `<p class="friend-status">Last seen ${relTime(f.lastSeen)}</p>`;

    const row = document.createElement('div');
    row.className = 'friend-row';
    row.dataset.uid      = f.uid;
    row.dataset.name     = f.name.toLowerCase();
    row.dataset.username = f.username.toLowerCase();
    row.dataset.online   = f.online;
    row.dataset.active   = f.active;
    row.dataset.added    = f.addedAt;
    row.dataset.interactions = f.interactions;
    row.dataset.mutual   = f.mutual;

    row.innerHTML = `
      <img class="friend-avatar" src="${f.avatar}" alt="${f.name}">
      <div class="friend-info">
        <p class="friend-name">${f.name}</p>
        ${statusText}
      </div>
      <button class="btn-message">Message</button>
      <button class="btn-more" aria-label="আরও অপশন">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="12" cy="19" r="1.7"/></svg>
      </button>`;

    row.querySelector('.btn-message').addEventListener('click', () => {
      window.location.href = `./message-1.html?uid=${f.uid}`;
    });

    row.querySelector('.btn-more').addEventListener('click', (e) => {
      e.stopPropagation();
      currentMoreRow = row;
      positionMenu(e.currentTarget);
      moreMenu.classList.add('show');
    });

    allFriendsList.appendChild(row);
  });
}

// ─────────────────────────────────────────────────────────────
// 2. REQUESTS  (friendRequests/<currentUid>/<senderUid> = { sentAt })
// ─────────────────────────────────────────────────────────────
async function loadRequests() {
  const snap = await get(ref(db, `friendRequests/${currentUid}`));
  requestList.innerHTML = '';

  if (!snap.exists()) {
    noRequestResults.style.display = '';
    requestCountEl.textContent = '0';
    return;
  }

  const entries = Object.entries(snap.val()); // [[senderUid, {sentAt}], ...]
  const profiles = await Promise.all(entries.map(([uid]) => fetchProfile(uid)));

  let count = 0;
  entries.forEach(([senderUid, meta], i) => {
    const p = profiles[i];
    if (!p) return;

    const name   = p.displayName || p.name || 'Unknown';
    const avatar = avatarFor(name, p.photoURL || p.avatar || p.photo);
    const when   = relTime(meta.sentAt);

    const row = document.createElement('div');
    row.className = 'friend-row';
    row.dataset.uid      = senderUid;
    row.dataset.name     = name.toLowerCase();
    row.dataset.username = (p.username || '').toLowerCase();

    row.innerHTML = `
      <img class="friend-avatar" src="${avatar}" alt="${name}">
      <div class="friend-info">
        <p class="friend-name">${name}</p>
        <p class="friend-status">Requested ${when}</p>
      </div>
      <button class="btn-accept-request">Accept</button>
      <button class="btn-remove-request">Remove</button>`;

    // Accept
    row.querySelector('.btn-accept-request').addEventListener('click', async () => {
      await acceptRequest(senderUid, name, avatar, row);
    });

    // Remove (decline)
    row.querySelector('.btn-remove-request').addEventListener('click', async () => {
      await remove(ref(db, `friendRequests/${currentUid}/${senderUid}`));
      await remove(ref(db, `sentFriendRequests/${senderUid}/${currentUid}`));
      row.remove();
      updateRequestCount();
      showToast('রিকোয়েস্ট বাতিল করা হয়েছে');
    });

    requestList.appendChild(row);
    count++;
  });

  requestCountEl.textContent = count;
  noRequestResults.style.display = count === 0 ? '' : 'none';
}

async function acceptRequest(senderUid, name, avatar, row) {
  const now = serverTimestamp();
  // বিদ্যমান friendship লেখো (bidirectional)
  await set(ref(db, `friends/${currentUid}/${senderUid}`), { addedAt: Date.now() });
  await set(ref(db, `friends/${senderUid}/${currentUid}`), { addedAt: Date.now() });
  // রিকোয়েস্ট মুছো
  await remove(ref(db, `friendRequests/${currentUid}/${senderUid}`));
  await remove(ref(db, `sentFriendRequests/${senderUid}/${currentUid}`));

  row.remove();
  updateRequestCount();

  // All Friends লিস্টে যোগ করো
  const newFriend = {
    uid: senderUid, name, username: '', avatar,
    online: false, active: true, addedAt: Date.now(),
    interactions: 0, mutual: 0, lastSeen: 0
  };
  friendsData.unshift(newFriend);
  renderFriends(friendsData);
  allFriendsCountEl.textContent = friendsData.length;

  showToast(`${name} এখন তোমার বন্ধু!`);
}

function updateRequestCount() {
  const remaining = requestList.querySelectorAll('.friend-row').length;
  requestCountEl.textContent = remaining;
  noRequestResults.style.display = remaining === 0 ? '' : 'none';
}

// ─────────────────────────────────────────────────────────────
// 3. BLOCKED  (blockedUsers/<currentUid>/<blockedUid> = { blockedAt })
// ─────────────────────────────────────────────────────────────
async function loadBlocked() {
  const snap = await get(ref(db, `blockedUsers/${currentUid}`));
  blockedList.innerHTML = '';

  if (!snap.exists()) {
    noBlockedResults.style.display = '';
    blockedCountEl.textContent = '0';
    return;
  }

  const entries = Object.entries(snap.val());
  const profiles = await Promise.all(entries.map(([uid]) => fetchProfile(uid)));

  let count = 0;
  entries.forEach(([uid, meta], i) => {
    const p = profiles[i];
    if (!p) return;

    const name   = p.displayName || p.name || 'Unknown';
    const avatar = avatarFor(name, p.photoURL || p.avatar || p.photo);
    const when   = relTime(meta.blockedAt);

    const row = document.createElement('div');
    row.className = 'friend-row';
    row.dataset.uid  = uid;
    row.dataset.name = name.toLowerCase();

    row.innerHTML = `
      <img class="friend-avatar" src="${avatar}" alt="${name}">
      <div class="friend-info">
        <p class="friend-name">${name}</p>
        <p class="friend-status">Blocked ${when}</p>
      </div>
      <button class="btn-unblock">Unblock</button>`;

    row.querySelector('.btn-unblock').addEventListener('click', async () => {
      await remove(ref(db, `blockedUsers/${currentUid}/${uid}`));
      row.remove();
      const rem = blockedList.querySelectorAll('.friend-row').length;
      blockedCountEl.textContent = rem;
      noBlockedResults.style.display = rem === 0 ? '' : 'none';
      showToast(`${name} কে আনব্লক করা হয়েছে`);
    });

    blockedList.appendChild(row);
    count++;
  });

  blockedCountEl.textContent = count;
  noBlockedResults.style.display = count === 0 ? '' : 'none';
}

// ─────────────────────────────────────────────────────────────
// 4. SUGGESTIONS  (users/ থেকে — যারা বন্ধু নয় এবং ব্লক নয়)
// ─────────────────────────────────────────────────────────────
async function loadSuggestions() {
  // বর্তমান বন্ধু ও ব্লক তালিকা পাও
  const [friendsSnap, blockedSnap, requestsSnap, allUsersSnap] = await Promise.all([
    get(ref(db, `friends/${currentUid}`)),
    get(ref(db, `blockedUsers/${currentUid}`)),
    get(ref(db, `sentFriendRequests/${currentUid}`)),   // আমার পাঠানো রিকোয়েস্ট
    get(ref(db, 'users'))
  ]);

  const friendUids  = friendsSnap.exists()  ? Object.keys(friendsSnap.val())  : [];
  const blockedUids = blockedSnap.exists()  ? Object.keys(blockedSnap.val())  : [];
  const sentUids    = requestsSnap.exists() ? Object.keys(requestsSnap.val()) : [];

  const excluded = new Set([...friendUids, ...blockedUids, ...sentUids, currentUid]);

  let suggestions = [];
  if (allUsersSnap.exists()) {
    allUsersSnap.forEach(child => {
      if (!excluded.has(child.key)) {
        suggestions.push({ uid: child.key, ...child.val() });
      }
    });
  }

  // সর্বোচ্চ 15 সাজেশন
  suggestions = suggestions.slice(0, 15);

  renderSuggestions(suggestions, homeSuggestionGrid, true);
  renderSuggestions(suggestions, suggestionGridWrap, false);

  noSuggestionResults.style.display = suggestions.length === 0 ? '' : 'none';
}

function renderSuggestions(list, container, isCarousel) {
  container.innerHTML = '';
  if (list.length === 0) return;

  list.forEach(p => {
    const name   = p.displayName || p.name || 'Unknown';
    const uname  = p.username ? `@${p.username}` : '';
    const avatar = avatarFor(name, p.photoURL || p.avatar || p.photo);

    const card = document.createElement('div');
    card.className = 'suggestion-card';
    card.dataset.uid  = p.uid;
    card.dataset.name = name.toLowerCase();
    card.dataset.username = uname.toLowerCase();

    card.innerHTML = `
      <img class="suggestion-avatar" src="${avatar}" alt="${name}">
      <p class="suggestion-name">${name}</p>
      <p class="suggestion-username">${uname}</p>
      <button class="btn-add-friend">Add Friend</button>
      <button class="btn-remove">Remove</button>`;

    const addBtn = card.querySelector('.btn-add-friend');
    const remBtn = card.querySelector('.btn-remove');

    addBtn.addEventListener('click', async () => {
      if (sentRequests.has(p.uid)) return;
      sentRequests.add(p.uid);

      // friendRequests/<targetUid>/<myUid> = {sentAt}  — incoming রিকোয়েস্ট
      // sentFriendRequests/<myUid>/<targetUid> = {sentAt} — পাঠানো ট্র্যাক
      const now = Date.now();
      await set(ref(db, `friendRequests/${p.uid}/${currentUid}`), { sentAt: now });
      await set(ref(db, `sentFriendRequests/${currentUid}/${p.uid}`), { sentAt: now });

      addBtn.textContent = 'Request Sent';
      addBtn.disabled = true;
      showToast(`${name}-কে ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে`);
    });

    remBtn.addEventListener('click', () => {
      card.style.opacity = '0';
      card.style.transition = 'opacity 0.2s ease';
      setTimeout(() => card.remove(), 200);
    });

    container.appendChild(card);
  });
}

// ─────────────────────────────────────────────────────────────
// More Menu — Block / Unfriend
// ─────────────────────────────────────────────────────────────
function positionMenu(btn) {
  const rect = btn.getBoundingClientRect();
  const menuWidth = 150;
  let left = rect.right - menuWidth;
  left = Math.max(10, Math.min(left, window.innerWidth - menuWidth - 10));
  moreMenu.style.top  = (rect.bottom + 6) + 'px';
  moreMenu.style.left = left + 'px';
}

document.addEventListener('click', (e) => {
  if (moreMenu.classList.contains('show') && !moreMenu.contains(e.target) && !e.target.closest('.btn-more')) {
    moreMenu.classList.remove('show');
  }
});

document.getElementById('blockMenuItem').addEventListener('click', async () => {
  if (!currentMoreRow) return;
  const uid  = currentMoreRow.dataset.uid;
  const name = currentMoreRow.querySelector('.friend-name').textContent;

  // Firebase: বন্ধুত্ব মুছো, ব্লক যোগ করো
  await remove(ref(db, `friends/${currentUid}/${uid}`));
  await remove(ref(db, `friends/${uid}/${currentUid}`));
  await set(ref(db, `blockedUsers/${currentUid}/${uid}`), { blockedAt: Date.now() });

  currentMoreRow.remove();
  friendsData = friendsData.filter(f => f.uid !== uid);
  allFriendsCountEl.textContent = friendsData.length;

  // Blocked তালিকায় যোগ করো
  await loadBlocked();

  moreMenu.classList.remove('show');
  showToast(`${name} কে ব্লক করা হয়েছে`);
  currentMoreRow = null;
});

document.getElementById('unfriendMenuItem').addEventListener('click', async () => {
  if (!currentMoreRow) return;
  const uid  = currentMoreRow.dataset.uid;
  const name = currentMoreRow.querySelector('.friend-name').textContent;

  // Firebase: উভয় দিক থেকে বন্ধুত্ব মুছো
  await remove(ref(db, `friends/${currentUid}/${uid}`));
  await remove(ref(db, `friends/${uid}/${currentUid}`));
  // পুরনো রিকোয়েস্ট ট্র্যাক (যেকোনো দিক থেকে হতে পারত) মুছো, নাহলে suggestions-এ আর দেখাবে না
  await remove(ref(db, `sentFriendRequests/${currentUid}/${uid}`));
  await remove(ref(db, `sentFriendRequests/${uid}/${currentUid}`));

  currentMoreRow.remove();
  friendsData = friendsData.filter(f => f.uid !== uid);
  allFriendsCountEl.textContent = friendsData.length;
  noFriendResults.style.display = friendsData.length === 0 ? '' : 'none';

  moreMenu.classList.remove('show');
  showToast(`${name}-কে বন্ধু তালিকা থেকে সরানো হয়েছে`);
  currentMoreRow = null;
});

// ─────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const key = tab.dataset.tab;
    Object.values(tabPanels).forEach(p => { if (p) p.style.display = 'none'; });
    if (tabPanels[key]) tabPanels[key].style.display = '';
    filterBtn.style.display = key === 'all' ? '' : 'none';
    searchBox.classList.toggle('full-width', key !== 'all');
    applySearch(searchInput.value);
  });
});

// ─────────────────────────────────────────────────────────────
// Search
// ─────────────────────────────────────────────────────────────
function applySearch(q) {
  const activeTab = document.querySelector('.tab-item.active').dataset.tab;
  if (activeTab === 'all')       refreshAllFriendsVisibility();
  else if (activeTab === 'request')  refreshListVisibility(requestList, q, noRequestResults, requestCountEl);
  else if (activeTab === 'suggested') refreshCardVisibility(suggestionGridWrap, q, noSuggestionResults);
}

searchInput.addEventListener('input', () => applySearch(searchInput.value));

function refreshAllFriendsVisibility() {
  const q = searchInput.value.trim().toLowerCase();
  let visible = 0;
  allFriendsList.querySelectorAll('.friend-row').forEach(row => {
    const nameMatch = (row.dataset.name || '').includes(q);
    const unameMatch = (row.dataset.username || '').includes(q);
    const searchOk = q === '' || nameMatch || unameMatch;

    let showOk = true;
    if (currentShowFilter === 'online')          showOk = row.dataset.online === 'true';
    if (currentShowFilter === 'recently_active') showOk = row.dataset.active === 'true';

    const show = searchOk && showOk;
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const noFilter = (q === '' && currentShowFilter === 'all');
  allFriendsCountEl.textContent = noFilter ? friendsData.length : visible;
  noFriendResults.style.display = visible === 0 ? '' : 'none';
}

function refreshListVisibility(list, q, noEl, countEl) {
  const query = (q || '').trim().toLowerCase();
  let visible = 0;
  list.querySelectorAll('.friend-row').forEach(row => {
    const match = query === '' || (row.dataset.name || '').includes(query) || (row.dataset.username || '').includes(query);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  if (countEl) countEl.textContent = visible;
  noEl.style.display = visible === 0 ? '' : 'none';
}

function refreshCardVisibility(grid, q, noEl) {
  const query = (q || '').trim().toLowerCase();
  let visible = 0;
  grid.querySelectorAll('.suggestion-card').forEach(card => {
    const match = query === '' || (card.dataset.name || '').includes(query) || (card.dataset.username || '').includes(query);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  noEl.style.display = visible === 0 ? '' : 'none';
}

// ─────────────────────────────────────────────────────────────
// Filter Sheet
// ─────────────────────────────────────────────────────────────
filterBtn.addEventListener('click', () => {
  sheetOverlay.classList.add('show');
  document.body.style.overflow = 'hidden';
});

sheetOverlay.addEventListener('click', (e) => {
  if (e.target === sheetOverlay) {
    sheetOverlay.classList.remove('show');
    document.body.style.overflow = '';
  }
});

document.querySelectorAll('.option-list').forEach(list => {
  list.addEventListener('click', (e) => {
    const item = e.target.closest('.option-item');
    if (!item) return;
    list.querySelectorAll('.option-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.querySelectorAll('.option-list').forEach(list => {
    list.querySelectorAll('.option-item').forEach((item, idx) => item.classList.toggle('active', idx === 0));
  });
});

function getSelectedValue(group) {
  const list = document.querySelector(`.option-list[data-group="${group}"]`);
  const active = list ? list.querySelector('.option-item.active') : null;
  return active ? active.dataset.value : null;
}

document.getElementById('applyBtn').addEventListener('click', () => {
  const sortValue = getSelectedValue('sort') || 'name_asc';
  const viewValue = getSelectedValue('view') || 'list';
  currentShowFilter = getSelectedValue('show') || 'all';

  // Sort in-memory friendsData
  const sorted = [...friendsData].sort((a, b) => {
    switch (sortValue) {
      case 'name_asc':       return a.name.localeCompare(b.name);
      case 'name_desc':      return b.name.localeCompare(a.name);
      case 'recent_added':   return b.addedAt - a.addedAt;
      case 'most_interacted':return b.interactions - a.interactions;
      case 'mutual_friends': return b.mutual - a.mutual;
      default: return 0;
    }
  });
  renderFriends(sorted);

  allFriendsList.classList.toggle('grid-mode', viewValue === 'grid');
  refreshAllFriendsVisibility();

  sheetOverlay.classList.remove('show');
  document.body.style.overflow = '';
  showToast('ফিল্টার প্রয়োগ করা হয়েছে');
});
</script>
