<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary:      #8A4FF7;
      --bg:           #ffffff;
      --surface:      #f7f7f7;
      --border:       #f0f0f0;
      --text:         #1a1a1a;
      --text-2:       #555;
      --text-muted:   #aaa;
      --topbar-h:     46px;
      --pad:          15px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       TOP BAR — 46px, no border
    ══════════════════════════════════════ */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: #fff;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-inner {
      width: 100%; max-width: 420px;
      padding: 0 12px;
      display: flex; align-items: center;
      justify-content: space-between;
    }

    .icon-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; border-radius: 50%;
      cursor: pointer; color: var(--text);
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover { background: var(--surface); }

    .topbar-right { display: flex; align-items: center; gap: 2px; }

    /* 3-dot dropdown */
    .more-wrap { position: relative; }

    .dropdown {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: #fff; border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      min-width: 155px; padding: 6px; z-index: 300;
      animation: fadeDown .15s ease;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px;
      border: none; background: none; cursor: pointer;
      border-radius: 10px;
      font-size: 14px; font-family: 'Poppins', sans-serif;
      font-weight: 500; color: #e63950;
      transition: background .15s; white-space: nowrap;
    }
    .dropdown-item:hover { background: #fff5f5; }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    .main {
      padding-top: var(--topbar-h);
      display: flex; flex-direction: column; align-items: center;
    }

    .page-body {
      width: 100%; max-width: 420px;
      padding: 0 var(--pad);
    }

    /* ══════════════════════════════════════
       COVER PHOTO
       10px border-radius, extends to edges
    ══════════════════════════════════════ */
    .cover-wrap {
      margin: 0 calc(-1 * var(--pad));
      position: relative;
    }

    .cover-photo {
      width: 100%;
      height: 145px;
      border-radius: 10px;
      background: #d9d9d9;
      overflow: hidden;
    }

    .cover-photo img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* ══════════════════════════════════════
       PROFILE SECTION
       Pic overlaps cover by 50% (50px)
       Info stacked below pic — left aligned
    ══════════════════════════════════════ */
    .profile-section {
      margin-top: -50px;
      padding: 0 4px 20px;
      position: relative;
      z-index: 10;
    }

    /* ── Profile Pic ── */
    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #ffffff;
      background: #e0e0e0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 10px;
    }

    .profile-pic img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .default-avatar { color: #b8b8b8; }

    /* ── Info block (left-aligned, below pic) ── */
    .profile-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .profile-info.loaded { opacity: 1; }

    .profile-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .profile-username {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .profile-bio {
      font-size: 11.5px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-2);
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: break-word;
      max-width: 27ch;
      margin-bottom: 8px;
    }

    .profile-address {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 400; color: var(--text-muted);
    }
    .profile-address svg { flex-shrink: 0; }

    /* ── Action Buttons ── */
    .profile-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-edit,
    .btn-share {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 30.5px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Edit — gradient */
    .btn-edit {
      width: 171.5px;
      background: linear-gradient(to right, #6D3DF5, #8A4DFF, #A85CF6);
      border: none;
      color: #fff;
      transition: opacity .15s, transform .15s;
    }
    .btn-edit:hover { opacity: .91; transform: translateY(-1px); }

    /* Share — neutral */
    .btn-share {
      width: 154.5px;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      color: var(--text);
      transition: background .15s;
    }
    .btn-share:hover { background: var(--surface); }

    .btn-share img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    /* ══════════════════════════════════════
       HIGHLIGHTS ROW
    ══════════════════════════════════════ */
    .highlights-section {
      margin-top: 18px;
      padding-bottom: 4px;
    }

    .highlights-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .highlights-scroll::-webkit-scrollbar { display: none; }

    .hl-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .hl-media {
      width: 78px;
      height: 100px;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hl-media img,
    .hl-media video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* New button card */
    .hl-new .hl-media {
      background: #f3f3f3;
      border: 1.5px dashed #ccc;
      color: #bbb;
    }

    /* ── Profile Stats ── */
    .profile-header {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 10px;
    }

    .profile-stats {
      flex: 1;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-top: 54px; /* push below cover line */
      padding-bottom: 4px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-count {
      font-size: 17px;
      font-weight: 550;
      color: var(--text);
      line-height: 1.2;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .hl-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      text-align: center;
      width: 78px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ══════════════════════════════════════
       HIGHLIGHT FULL-SCREEN VIEWER
    ══════════════════════════════════════ */
    .hl-viewer {
      position: fixed; inset: 0;
      background: #000;
      z-index: 600;
      display: flex; align-items: center; justify-content: center;
    }

    .hl-viewer-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px;
      background: linear-gradient(rgba(0,0,0,.55), transparent);
      z-index: 10;
    }

    .hl-vbtn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: #fff; border-radius: 50%;
    }

    .hl-more-wrap { position: relative; }

    .hl-viewer-dd {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: #fff; border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,.22);
      min-width: 130px; padding: 6px; z-index: 20;
    }

    .hl-delete-btn {
      width: 100%; padding: 10px 12px;
      border: none; background: none; cursor: pointer;
      font-size: 14px; font-family: 'Poppins', sans-serif;
      font-weight: 500; color: #e63950;
      text-align: left; border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .hl-delete-btn:hover { background: #fff5f5; }

    .hl-viewer-media {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 56px 0 50px;
    }
    .hl-viewer-media img,
    .hl-viewer-media video {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }

    .hl-viewer-title {
      position: absolute; bottom: 20px; left: 0; right: 0;
      text-align: center; color: #fff;
      font-size: 14px; font-weight: 600;
      text-shadow: 0 1px 6px rgba(0,0,0,.6);
    }

    /* ══════════════════════════════════════
       UPLOAD MODAL
    ══════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 500;
      display: flex; align-items: flex-end; justify-content: center;
    }

    .modal-sheet {
      background: #fff;
      width: 100%; max-width: 420px;
      border-radius: 20px 20px 0 0;
      padding: 22px 20px 32px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: #ddd; border-radius: 2px;
      margin: 0 auto 6px;
    }

    .modal-title {
      font-size: 15px; font-weight: 600; text-align: center;
    }

    .modal-preview {
      width: 100%; height: 180px;
      background: #f5f5f5; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; cursor: pointer; border: 2px dashed #ddd;
      color: var(--text-muted); font-size: 13px;
    }

    .modal-preview img,
    .modal-preview video {
      width: 100%; height: 100%; object-fit: cover;
    }

    .modal-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e8e8e8; border-radius: 10px;
      font-size: 14px; font-family: 'Poppins', sans-serif;
      outline: none; color: var(--text);
    }

    .modal-input:focus {
      border-color: #8A4DFF;
      box-shadow: 0 0 0 3px rgba(138,77,255,.1);
    }

    .char-count {
      font-size: 11px; color: var(--text-muted);
      text-align: right; margin-top: -8px;
    }

    .modal-post-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(to right, #6D3DF5, #8A4DFF, #A85CF6);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer; position: relative;
      transition: opacity .2s;
    }
    .modal-post-btn:disabled { opacity: .6; cursor: not-allowed; }
    .modal-post-btn.loading { color: transparent; }
    .modal-post-btn.loading::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .modal-cancel {
      background: none; border: none;
      font-size: 14px; color: var(--text-muted);
      font-family: 'Poppins', sans-serif;
      cursor: pointer; text-align: center;
    }

    /* ══════════════════════════════════════
       POSTS TAB BAR
    ══════════════════════════════════════ */
    .posts-tab-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1.5px solid var(--border);
      margin: 0 calc(-1 * var(--pad));
      padding-top: 10px;
      margin-top: 6px;
    }

    .posts-tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      background: none;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      transition: color .15s, border-color .15s;
    }

    .posts-tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .posts-tab-btn svg {
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       POST CARDS LIST
    ══════════════════════════════════════ */
    .posts-list {
      padding: 12px 0 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .post-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Card Header ── */
    .post-card-header {
      display: flex;
      align-items: center;
      padding: 10px 12px 8px;
      gap: 10px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #e0e0e0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    .post-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .post-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .post-author {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .post-time {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .post-more-wrap {
      position: relative;
    }

    .post-dots-btn {
      width: 32px; height: 32px;
      border: none; background: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 50%;
      color: var(--text-muted);
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .post-dots-btn:hover { background: var(--surface); }

    .post-dropdown {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: #fff; border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      min-width: 140px; padding: 5px; z-index: 200;
      animation: fadeDown .15s ease;
    }

    .post-dropdown-item {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 9px 12px;
      border: none; background: none; cursor: pointer;
      border-radius: 8px;
      font-size: 13.5px; font-family: 'Poppins', sans-serif;
      font-weight: 500; color: #e63950;
      transition: background .15s; white-space: nowrap;
    }
    .post-dropdown-item:hover { background: #fff5f5; }

    /* ── Caption ── */
    .post-caption {
      padding: 0 12px 8px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.55;
    }

    .post-caption-text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-caption-text.expanded {
      display: block;
      overflow: visible;
    }

    .see-more-btn {
      background: none; border: none;
      font-size: 12.5px; font-family: 'Poppins', sans-serif;
      font-weight: 500; color: var(--text-muted);
      cursor: pointer; padding: 0;
      margin-top: 2px;
      display: inline-block;
    }

    /* ── Media ── */
    .post-media {
      width: 100%;
      max-height: 380px;
      overflow: hidden;
      background: #f0f0f0;
    }

    .post-media img,
    .post-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Actions Row ── */
    .post-actions {
      display: flex;
      align-items: center;
      padding: 8px 12px 10px;
      gap: 0;
    }

    .post-action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none; border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 12.5px; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer; padding: 6px 8px;
      border-radius: 8px;
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .post-action-btn:hover { background: var(--surface); }

    .post-action-btn.liked { color: #e63950; }
    .post-action-btn.liked svg { fill: #e63950; stroke: #e63950; }

    .post-action-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      min-width: 10px;
    }

    .post-save-btn {
      margin-left: auto;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      cursor: pointer; border-radius: 50%;
      color: var(--text-muted);
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .post-save-btn:hover { background: var(--surface); }
    .post-save-btn.saved { color: var(--primary); }
    .post-save-btn.saved svg { fill: var(--primary); }

    /* ── Empty state ── */
    .posts-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .posts-empty svg { opacity: .35; }

    .posts-empty p {
      font-size: 13px;
      font-weight: 500;
      text-align: center;
    }

    /* delete animation */
    .post-card.deleting {
      animation: fadeOut .25s ease forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(.97); height: 0; margin: 0; padding: 0; overflow: hidden; }
    }
  </style>
</head>
<body>

  <!-- ══ App ══ -->
  <div id="app">

    <!-- Top Navbar -->
    <header class="topbar">
      <div class="topbar-inner">

        <button class="icon-btn" id="backBtn" aria-label="Go back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>

        <div class="topbar-right">
          <button class="icon-btn" aria-label="Notifications"
                  onclick="window.location.href='/notifications'">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>

          <div class="more-wrap">
            <button class="icon-btn" id="moreBtn" aria-label="More options">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="5"  cy="12" r="1.6"/>
                <circle cx="12" cy="12" r="1.6"/>
                <circle cx="19" cy="12" r="1.6"/>
              </svg>
            </button>

            <div class="dropdown hidden" id="dropdown">
              <button class="dropdown-item" id="logoutBtn">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Log Out
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>


    <!-- Main -->
    <main class="main">
      <div class="page-body">

        <!-- Cover Photo (grey default, 10px radius) -->
        <div class="cover-wrap">
          <div class="cover-photo" id="coverPhoto"></div>
        </div>

        <!-- Profile section (overlaps cover by 50%) -->
        <div class="profile-section">

          <!-- Row: Profile Pic (left) + Stats (right) -->
          <div class="profile-header">

            <div class="profile-pic" id="profilePic">
              <svg class="default-avatar" width="52" height="52"
                   viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.67 0 8 1.34 8 4v2H4v-2c0-2.66
                         5.33-4 8-4zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
              </svg>
            </div>

            <div class="profile-stats">
              <div class="stat-item">
                <span class="stat-count" id="postsCount">0</span>
                <span class="stat-label">Post</span>
              </div>
              <div class="stat-item">
                <span class="stat-count" id="friendsCount">0</span>
                <span class="stat-label">Friends</span>
              </div>
              <div class="stat-item">
                <span class="stat-count" id="followersCount">0</span>
                <span class="stat-label">Follower</span>
              </div>
            </div>

          </div>

          <!-- Info -->
          <div class="profile-info">
            <h1 class="profile-name"     id="profileName"></h1>
            <p  class="profile-username"  id="profileUsername"></p>
            <p  class="profile-bio"       id="profileBio"></p>
            <div class="profile-address hidden" id="profileAddress">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <span id="addressText"></span>
            </div>

            <!-- Action Buttons -->
            <div class="profile-actions">

              <button class="btn-edit" onclick="window.location.href='/edit-profile'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="#fff" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 20h9"/>
                  <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                </svg>
                Edit Profile
              </button>

              <button class="btn-share" id="shareBtn">
                <img src="https://i.ibb.co.com/5hsvkZPk/images-removebg-preview.png"
                     alt="share" />
                Share Profile
              </button>

            </div>

            <!-- Highlights Row -->
            <div class="highlights-section">
              <div class="highlights-scroll" id="highlightsRow">

                <!-- New button — plain + icon, no circle background -->
                <div class="hl-item hl-new" id="hlNewBtn">
                  <div class="hl-media">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                         stroke="#bbb" stroke-width="2"
                         stroke-linecap="round">
                      <line x1="12" y1="5" x2="12" y2="19"/>
                      <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                  </div>
                  <span class="hl-title">New</span>
                </div>

              </div>
            </div>
          </div>

        </div>

        <!-- ══ Posts Tab Bar ══ -->
        <div class="posts-tab-bar" id="postsTabBar">
          <button class="posts-tab-btn active" id="allPostsTab">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            All Posts
          </button>
        </div>

        <!-- ══ Posts List ══ -->
        <div class="posts-list" id="postsList">
          <div class="posts-empty" id="postsEmpty">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <line x1="9" y1="9" x2="15" y2="9"/>
              <line x1="9" y1="12" x2="15" y2="12"/>
              <line x1="9" y1="15" x2="12" y2="15"/>
            </svg>
            <p>No posts yet</p>
          </div>
        </div>

      </div>
    </main>

  </div>


  <!-- ══ Upload Modal ══ -->
  <div class="modal-overlay hidden" id="uploadModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">New Highlight</p>

      <div class="modal-preview" id="modalPreview" style="cursor:pointer;">
        <span id="previewHint">Tap to add photo / video</span>
      </div>
      <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none"/>

      <input class="modal-input" type="text" id="hlTitleInput"
             placeholder="Title (max 8 chars)" maxlength="8" autocomplete="off" />
      <p class="char-count"><span id="charCount">0</span>/8</p>

      <button class="modal-post-btn" id="modalPostBtn">Post</button>
      <button class="modal-cancel" id="modalCancel">Cancel</button>
    </div>
  </div>


  <!-- ══ Highlight Viewer ══ -->
  <div class="hl-viewer hidden" id="hlViewer">
    <div class="hl-viewer-bar">
      <button class="hl-vbtn" id="hlViewerClose">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="hl-more-wrap">
        <button class="hl-vbtn" id="hlViewerMore">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="5"  cy="12" r="1.6"/>
            <circle cx="12" cy="12" r="1.6"/>
            <circle cx="19" cy="12" r="1.6"/>
          </svg>
        </button>
        <div class="hl-viewer-dd hidden" id="hlViewerDd">
          <button class="hl-delete-btn" id="hlDeleteBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
            </svg>
            Delete
          </button>
        </div>
      </div>
    </div>
    <div class="hl-viewer-media" id="hlViewerMedia"></div>
    <div class="hl-viewer-title" id="hlViewerTitle"></div>
  </div>


  <!-- ══ Firebase ══ -->
  <script type="module">
    import { auth, db, uploadToCloudinary } from "./config.js";
    import {
      onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import {
      ref, onValue, push, set, remove, get, update
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-database.js";

    const $ = (id) => document.getElementById(id);

    const backBtn         = $("backBtn");
    const moreBtn         = $("moreBtn");
    const dropdown        = $("dropdown");
    const logoutBtn       = $("logoutBtn");
    const coverPhoto      = $("coverPhoto");
    const profilePic      = $("profilePic");
    const profileName     = $("profileName");
    const profileUsername = $("profileUsername");
    const profileBio      = $("profileBio");
    const profileAddress  = $("profileAddress");
    const addressText     = $("addressText");
    const postsCount     = $("postsCount");
    const friendsCount   = $("friendsCount");
    const followersCount = $("followersCount");
    const highlightsRow  = $("highlightsRow");
    const hlNewBtn        = $("hlNewBtn");
    const uploadModal     = $("uploadModal");
    const modalPreview    = $("modalPreview");
    const previewHint     = $("previewHint");
    const mediaInput      = $("mediaInput");
    const hlTitleInput    = $("hlTitleInput");
    const charCount       = $("charCount");
    const modalPostBtn    = $("modalPostBtn");
    const modalCancel     = $("modalCancel");
    const shareBtn        = $("shareBtn");

    let currentUser  = null;
    let selectedFile = null;
    let currentHlId  = null;

    // ── Back ────────────────────────────────────────────────
    backBtn.addEventListener("click", () => {
      if (history.length > 1) history.back();
      else window.location.href = "/";
    });

    // ── Dropdown ────────────────────────────────────────────
    moreBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("hidden");
    });
    document.addEventListener("click", () => dropdown.classList.add("hidden"));
    dropdown.addEventListener("click", (e) => e.stopPropagation());

    // ── Logout ───────────────────────────────────────────────
    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "/login";
    });

    // ── Share Profile ────────────────────────────────────────
    document.getElementById("shareBtn").addEventListener("click", async () => {
      const url = window.location.href;
      if (navigator.share) {
        await navigator.share({ title: "Insight Profile", url });
      } else {
        await navigator.clipboard.writeText(url);
        const btn = document.getElementById("shareBtn");
        const orig = btn.innerHTML;
        btn.textContent = "Copied!";
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      }
    });

    // ── Auth check ───────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "/login"; return; }
      currentUser = user;
      loadProfile(user);
      loadHighlights(user.uid);
    });

    // ── Load profile ─────────────────────────────────────────
    function loadProfile(user) {
      onValue(ref(db, `users/${user.uid}`), (snap) => {
        const d = snap.val() || {};
        if (d.coverPhotoUrl) {
          coverPhoto.innerHTML = `<img src="${esc(d.coverPhotoUrl)}" alt="Cover">`;
        }
        const photoUrl = d.profilePhotoUrl || d.photoURL || user.photoURL || "";
        if (photoUrl) {
          profilePic.innerHTML = `<img src="${esc(photoUrl)}" alt="Profile">`;
        }
        const name = d.name || d.displayName || d.fullName || d.userName || user.displayName || "";
        profileName.textContent = name;
        if (d.username || d.userName) {
          const uname = d.username || d.userName;
          profileUsername.textContent = uname.startsWith("@") ? uname : "@" + uname;
        }
        if (d.bio) profileBio.textContent = d.bio;
        const addr = d.address || d.location || "";
        if (addr) { addressText.textContent = addr; profileAddress.classList.remove("hidden"); }

        // Stats
        postsCount.textContent     = d.postsCount     || 0;
        friendsCount.textContent   = d.friendsCount   || 0;
        followersCount.textContent = d.followersCount || 0;

        // সব data সেট হওয়ার পর একসাথে দেখাবে
        document.querySelector(".profile-info").classList.add("loaded");

        // Load posts with profile photo + name
        loadPosts(user.uid, photoUrl, name);
      });
    }

    // ── Load highlights ───────────────────────────────────────
    function loadHighlights(uid) {
      onValue(ref(db, `users/${uid}/highlights`), (snap) => {
        // Remove old items (keep #hlNewBtn)
        highlightsRow.querySelectorAll(".hl-existing").forEach(el => el.remove());
        if (!snap.exists()) return;
        const items = [];
        snap.forEach(child => items.push({ id: child.key, ...child.val() }));
        items.sort((a, b) => a.timestamp - b.timestamp);
        items.forEach(item => {
          const el = buildHighlightItem(item);
          highlightsRow.appendChild(el);
        });
      });
    }

    function buildHighlightItem(item) {
      const wrap = document.createElement("div");
      wrap.className = "hl-item hl-existing";
      const mediaTag = item.mediaType === "video"
        ? `<video src="${esc(item.mediaUrl)}" muted playsinline></video>`
        : `<img src="${esc(item.mediaUrl)}" alt="${esc(item.title)}">`;
      wrap.innerHTML = `
        <div class="hl-media">${mediaTag}</div>
        <span class="hl-title">${esc(item.title)}</span>`;
      wrap.addEventListener("click", () => openViewer(item));
      return wrap;
    }

    // ── New button → open modal ───────────────────────────────
    hlNewBtn.addEventListener("click", () => {
      selectedFile = null;
      mediaInput.value = "";
      hlTitleInput.value = "";
      charCount.textContent = "0";
      previewHint.style.display = "block";
      const old = modalPreview.querySelector("img,video");
      if (old) old.remove();
      uploadModal.classList.remove("hidden");
    });

    // Fix: click preview → trigger file input
    modalPreview.addEventListener("click", () => mediaInput.click());

    modalCancel.addEventListener("click", () => uploadModal.classList.add("hidden"));
    uploadModal.addEventListener("click", (e) => {
      if (e.target === uploadModal) uploadModal.classList.add("hidden");
    });

    // ── Media preview ─────────────────────────────────────────
    mediaInput.addEventListener("change", () => {
      const file = mediaInput.files[0];
      if (!file) return;
      selectedFile = file;
      previewHint.style.display = "none";
      const old = modalPreview.querySelector("img,video");
      if (old) old.remove();
      const url = URL.createObjectURL(file);
      if (file.type.startsWith("video")) {
        const v = document.createElement("video");
        v.src = url; v.muted = true; v.autoplay = true;
        v.style.cssText = "width:100%;height:100%;object-fit:cover;pointer-events:none;";
        modalPreview.prepend(v);
      } else {
        const img = document.createElement("img");
        img.src = url;
        img.style.cssText = "width:100%;height:100%;object-fit:cover;pointer-events:none;";
        modalPreview.prepend(img);
      }
    });

    // ── Char count ────────────────────────────────────────────
    hlTitleInput.addEventListener("input", () => {
      charCount.textContent = hlTitleInput.value.length;
    });

    // ── Post highlight ────────────────────────────────────────
    modalPostBtn.addEventListener("click", async () => {
      const title = hlTitleInput.value.trim();
      if (!selectedFile) { alert("Please select a photo or video."); return; }
      if (!title)        { alert("Please enter a title."); return; }

      modalPostBtn.classList.add("loading");
      modalPostBtn.disabled = true;

      try {
        const { url, resourceType } = await uploadToCloudinary(selectedFile, "highlights");
        const hlRef = push(ref(db, `users/${currentUser.uid}/highlights`));
        await set(hlRef, {
          mediaUrl:  url,
          mediaType: resourceType === "video" ? "video" : "image",
          title:     title,
          timestamp: Date.now()
        });
        uploadModal.classList.add("hidden");
        selectedFile = null;
      } catch (err) {
        console.error("Upload error:", err);
        alert("Upload failed. Please try again.");
      } finally {
        modalPostBtn.classList.remove("loading");
        modalPostBtn.disabled = false;
      }
    });

    // ── Highlight viewer ──────────────────────────────────────
    const hlViewer    = $("hlViewer");
    const hlViewerMedia = $("hlViewerMedia");
    const hlViewerTitle = $("hlViewerTitle");
    const hlViewerDd  = $("hlViewerDd");

    function openViewer(item) {
      currentHlId = item.id;
      hlViewerMedia.innerHTML = item.mediaType === "video"
        ? `<video src="${esc(item.mediaUrl)}" controls autoplay playsinline
               style="max-width:100%;max-height:100%;object-fit:contain;"></video>`
        : `<img src="${esc(item.mediaUrl)}" alt="${esc(item.title)}"
               style="max-width:100%;max-height:100%;object-fit:contain;">`;
      hlViewerTitle.textContent = item.title;
      hlViewerDd.classList.add("hidden");
      hlViewer.classList.remove("hidden");
    }

    $("hlViewerClose").addEventListener("click", () => {
      hlViewer.classList.add("hidden");
      hlViewerMedia.innerHTML = "";
      currentHlId = null;
    });

    $("hlViewerMore").addEventListener("click", (e) => {
      e.stopPropagation();
      hlViewerDd.classList.toggle("hidden");
    });

    hlViewer.addEventListener("click", (e) => {
      if (!e.target.closest(".hl-more-wrap")) {
        hlViewerDd.classList.add("hidden");
      }
    });

    $("hlDeleteBtn").addEventListener("click", async () => {
      if (!currentHlId) return;
      try {
        await remove(ref(db, `users/${currentUser.uid}/highlights/${currentHlId}`));
        hlViewer.classList.add("hidden");
        hlViewerMedia.innerHTML = "";
        currentHlId = null;
      } catch (err) {
        console.error("Delete error:", err);
        alert("Delete failed. Please try again.");
      }
    });

    function esc(s) {
      return String(s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ══════════════════════════════════════
    //  POSTS SECTION
    // ══════════════════════════════════════

    const postsList  = $("postsList");
    const postsEmpty = $("postsEmpty");

    // Close all open dropdowns when clicking elsewhere
    document.addEventListener("click", () => {
      document.querySelectorAll(".post-dropdown").forEach(d => d.classList.add("hidden"));
    });

    function formatTime(ts) {
      if (!ts) return "";
      const diff = Date.now() - ts;
      const m = Math.floor(diff / 60000);
      const h = Math.floor(diff / 3600000);
      const d = Math.floor(diff / 86400000);
      if (m < 1)  return "Just now";
      if (m < 60) return `${m}m ago`;
      if (h < 24) return `${h}h ago`;
      if (d < 7)  return `${d}d ago`;
      return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function buildPostCard(post, uid, userPhotoUrl, userName) {
      const card = document.createElement("div");
      card.className = "post-card";
      card.dataset.postId = post.id;

      const avatarHtml = userPhotoUrl
        ? `<img src="${esc(userPhotoUrl)}" alt="avatar">`
        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="#ccc"><path d="M12 12c2.67 0 8 1.34 8 4v2H4v-2c0-2.66 5.33-4 8-4zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>`;

      const caption   = post.caption || "";
      const isLong    = caption.length > 120;
      const captionId = `cap-${post.id}`;

      const mediaHtml = post.mediaUrl
        ? `<div class="post-media">${
            post.mediaType === "video"
              ? `<video src="${esc(post.mediaUrl)}" controls playsinline></video>`
              : `<img src="${esc(post.mediaUrl)}" alt="post media" loading="lazy">`
          }</div>`
        : "";

      const likeCount    = post.likesCount    || 0;
      const commentCount = post.commentsCount || 0;
      const shareCount   = post.sharesCount   || 0;

      card.innerHTML = `
        <!-- Header -->
        <div class="post-card-header">
          <div class="post-avatar">${avatarHtml}</div>
          <div class="post-meta">
            <span class="post-author">${esc(userName || "You")}</span>
            <span class="post-time">${formatTime(post.timestamp)}</span>
          </div>
          <div class="post-more-wrap">
            <button class="post-dots-btn" aria-label="More options" data-pid="${esc(post.id)}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="5"  cy="12" r="1.5"/>
                <circle cx="12" cy="12" r="1.5"/>
                <circle cx="19" cy="12" r="1.5"/>
              </svg>
            </button>
            <div class="post-dropdown hidden" id="dd-${esc(post.id)}">
              <button class="post-dropdown-item" data-delete="${esc(post.id)}">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                </svg>
                Delete Post
              </button>
            </div>
          </div>
        </div>

        <!-- Caption -->
        ${caption ? `
        <div class="post-caption">
          <span class="post-caption-text" id="${captionId}">${esc(caption)}</span>
          ${isLong ? `<button class="see-more-btn" data-cap="${captionId}">See more</button>` : ""}
        </div>` : ""}

        <!-- Media -->
        ${mediaHtml}

        <!-- Actions -->
        <div class="post-actions">
          <button class="post-action-btn" data-like="${esc(post.id)}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="post-action-count" id="lc-${esc(post.id)}">${likeCount > 0 ? likeCount : ""}</span>
          </button>

          <button class="post-action-btn" data-comment="${esc(post.id)}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="post-action-count">${commentCount > 0 ? commentCount : ""}</span>
          </button>

          <button class="post-action-btn" data-share="${esc(post.id)}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            <span class="post-action-count">${shareCount > 0 ? shareCount : ""}</span>
          </button>

          <button class="post-save-btn" data-save="${esc(post.id)}" aria-label="Save">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>
      `;

      // ── 3-dot dropdown toggle ──
      const dotsBtn  = card.querySelector(".post-dots-btn");
      const postDd   = card.querySelector(".post-dropdown");
      dotsBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        document.querySelectorAll(".post-dropdown").forEach(d => {
          if (d !== postDd) d.classList.add("hidden");
        });
        postDd.classList.toggle("hidden");
      });
      postDd.addEventListener("click", (e) => e.stopPropagation());

      // ── Delete ──
      card.querySelector(`[data-delete="${post.id}"]`).addEventListener("click", async () => {
        postDd.classList.add("hidden");
        card.classList.add("deleting");
        setTimeout(async () => {
          try {
            await remove(ref(db, `posts/${uid}/${post.id}`));
            const countSnap = await get(ref(db, `users/${uid}/postsCount`));
            const cur = countSnap.exists() ? (countSnap.val() || 0) : 0;
            await update(ref(db, `users/${uid}`), { postsCount: Math.max(0, cur - 1) });
          } catch (err) {
            console.error("Delete post error:", err);
            card.classList.remove("deleting");
          }
        }, 250);
      });

      // ── See more ──
      const seMoreBtn = card.querySelector(".see-more-btn");
      if (seMoreBtn) {
        seMoreBtn.addEventListener("click", () => {
          const capEl = $(`cap-${post.id}`);
          capEl.classList.toggle("expanded");
          seMoreBtn.textContent = capEl.classList.contains("expanded") ? "See less" : "See more";
        });
      }

      // ── Like ──
      const likeBtn = card.querySelector(`[data-like="${post.id}"]`);
      const likeRef = ref(db, `posts/${uid}/${post.id}/likes/${uid}`);
      onValue(likeRef, (snap) => {
        if (snap.exists()) {
          likeBtn.classList.add("liked");
        } else {
          likeBtn.classList.remove("liked");
        }
      });
      likeBtn.addEventListener("click", async () => {
        const snap = await new Promise(res => onValue(likeRef, res, { onlyOnce: true }));
        if (snap.exists()) {
          await remove(likeRef);
          const countEl = $(`lc-${post.id}`);
          const cur = parseInt(countEl.textContent) || 0;
          const nxt = Math.max(0, cur - 1);
          countEl.textContent = nxt > 0 ? nxt : "";
        } else {
          await set(likeRef, true);
          const countEl = $(`lc-${post.id}`);
          const cur = parseInt(countEl.textContent) || 0;
          countEl.textContent = cur + 1;
        }
      });

      // ── Save ──
      const saveBtn = card.querySelector(`[data-save="${post.id}"]`);
      const saveRef = ref(db, `savedPosts/${uid}/${post.id}`);
      onValue(saveRef, (snap) => {
        saveBtn.classList.toggle("saved", snap.exists());
      });
      saveBtn.addEventListener("click", async () => {
        const snap = await new Promise(res => onValue(saveRef, res, { onlyOnce: true }));
        if (snap.exists()) {
          await remove(saveRef);
        } else {
          await set(saveRef, { postId: post.id, savedAt: Date.now() });
        }
      });

      return card;
    }

    // ── Load Posts ──
    function loadPosts(uid, photoUrl, name) {
      onValue(ref(db, `posts/${uid}`), (snap) => {
        // Remove old post cards (keep empty state)
        postsList.querySelectorAll(".post-card").forEach(c => c.remove());

        if (!snap.exists()) {
          postsEmpty.style.display = "flex";
          return;
        }

        const items = [];
        snap.forEach(child => items.push({ id: child.key, ...child.val() }));
        items.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        postsEmpty.style.display = "none";
        items.forEach(post => {
          const card = buildPostCard(post, uid, photoUrl, name);
          postsList.appendChild(card);
        });
      });
    }
  </script>
