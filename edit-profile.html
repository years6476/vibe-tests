<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profile — Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary:#8A4FF7; --primary-grad:linear-gradient(to right,#6D3DF5,#8A4DFF,#A85CF6);
      --bg:#fff; --border:#e8e8e8; --surface:#f7f7f7;
      --text:#1a1a1a; --text-2:#555; --text-muted:#aaa;
      --topbar-h:52px; --pad:14px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* TOPBAR */
    .topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;justify-content:center;}
    .topbar-inner{width:100%;max-width:420px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;}
    .icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:none;border:none;border-radius:50%;cursor:pointer;color:var(--text);transition:background .15s;}
    .icon-btn:hover{background:var(--surface);}
    .topbar-title{font-size:16px;font-weight:600;}
    .save-btn{background:none;border:none;color:#0A7AFF;font-size:14px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;padding:4px 2px;min-width:44px;position:relative;transition:opacity .2s;}
    .save-btn:hover{opacity:.75;} .save-btn:disabled{opacity:.45;cursor:not-allowed;}
    .save-btn.loading{color:transparent;}
    .save-btn.loading::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:15px;height:15px;border:2px solid rgba(10,122,255,.25);border-top-color:#0A7AFF;border-radius:50%;animation:spin .6s linear infinite;}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

    /* MAIN */
    .main{padding-top:var(--topbar-h);padding-bottom:48px;display:flex;flex-direction:column;align-items:center;}
    .page-body{width:100%;max-width:420px;}

    /* COVER */
    .cover-wrap{position:relative;cursor:pointer;}
    .cover-photo{width:100%;height:145px;background:#d9d9d9;border-radius:10px;overflow:hidden;position:relative;}
    .cover-photo img{width:100%;height:100%;object-fit:cover;display:block;}
    .cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;gap:6px;color:#fff;font-size:13px;font-weight:500;border-radius:10px;}

    /* PROFILE PIC */
    .pic-row{padding:0 var(--pad);margin-top:-46px;margin-bottom:14px;position:relative;z-index:10;}
    .profile-pic-edit{width:92px;height:92px;border-radius:50%;border:3px solid #fff;background:#e0e0e0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12);position:relative;cursor:pointer;}
    .profile-pic-edit img{width:100%;height:100%;object-fit:cover;display:block;}
    .default-av{color:#bbb;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
    .pic-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;}

    /* BOXES */
    .sections{display:flex;flex-direction:column;gap:12px;padding:0 var(--pad);}
    .form-box{background:transparent;border-radius:10px;overflow:visible;border:1.5px solid var(--border);}
    .section-label{font-size:12px;font-weight:600;color:var(--text-muted);margin:14px 2px 6px;text-transform:uppercase;letter-spacing:.5px;}

    /* FIELD ROW */
    .field-row{display:flex;align-items:center;padding:13px 16px;gap:10px;min-height:48px;position:relative;}
    .row-label{font-size:12px;font-weight:500;color:var(--text);flex-shrink:0;min-width:90px;}
    .row-input{flex:1;border:none;outline:none;font-size:12px;font-family:'Poppins',sans-serif;color:var(--text-2);background:transparent;text-align:left;}
    .row-input::placeholder{color:#d0d0d0;}
    .row-value{flex:1;font-size:12px;color:var(--text-muted);text-align:right;}
    .row-divider{height:1px;background:var(--border);margin:0 16px;}

    /* BIO */
    .bio-row{flex-direction:column;align-items:stretch;gap:8px;padding:13px 16px;}
    .bio-top{display:flex;justify-content:space-between;align-items:center;}
    .bio-label{font-size:12px;font-weight:500;color:var(--text);}
    .word-count{font-size:11px;color:var(--text-muted);}
    .bio-input{width:100%;border:none;outline:none;resize:none;font-size:12px;font-family:'Poppins',sans-serif;color:var(--text-2);background:transparent;line-height:1.55;min-height:68px;}
    .bio-input::placeholder{color:#d0d0d0;}

    /* LOCATION */
    .loc-group{flex:1;display:flex;align-items:center;gap:5px;position:relative;}
    .loc-icon{color:var(--text-muted);flex-shrink:0;display:flex;}
    .loc-suggestions{position:absolute;top:calc(100% + 8px);left:-106px;right:-16px;background:#fff;border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.13);border:1px solid var(--border);z-index:300;overflow:hidden;}
    .loc-item{padding:10px 14px;font-size:12px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);line-height:1.4;}
    .loc-item:last-child{border-bottom:none;}
    .loc-item:hover{background:var(--surface);}
    .loc-spinner{padding:10px 14px;font-size:12px;color:var(--text-muted);}

    /* LINKS */
    .link-item{display:flex;align-items:center;padding:11px 16px;gap:10px;}
    .link-platform{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
    .link-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .link-icon svg{width:22px;height:22px;}
    .link-platform-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;}
    .link-url{font-size:11.5px;color:#0A7AFF;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;display:block;text-align:right;flex-shrink:0;}
    .link-url:hover{text-decoration:underline;}
    .link-delete{background:none;border:none;cursor:pointer;color:#ccc;padding:4px;display:flex;align-items:center;flex-shrink:0;line-height:0;transition:color .15s;}
    .link-delete:hover{color:#e63950;}
    .add-link-row{display:flex;align-items:center;padding:11px 16px;gap:10px;}
    .add-link-btn{background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#0A7AFF;font-family:'Poppins',sans-serif;white-space:nowrap;flex-shrink:0;padding:0;}
    .add-link-btn:hover{opacity:.8;}
    .link-inline-input{flex:1;border:none;outline:none;font-size:12px;font-family:'Poppins',sans-serif;color:var(--text-2);background:transparent;}
    .link-inline-input::placeholder{color:#d0d0d0;}

    /* TOGGLE SWITCH */
    .toggle-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}
    .toggle-sub{font-size:12px;color:var(--text-2);white-space:nowrap;}
    .t-switch{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;}
    .t-switch input{opacity:0;width:0;height:0;position:absolute;}
    .t-knob{position:absolute;inset:0;background:#ddd;border-radius:11px;transition:background .2s;cursor:pointer;}
    .t-knob::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .t-switch input:checked + .t-knob{background:var(--primary);}
    .t-switch input:checked + .t-knob::after{transform:translateX(18px);}

    /* EMAIL ROW */
    .email-val{flex:1;font-size:12px;color:var(--text-muted);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* LOGOUT BOX */
    .logout-box{border-color:var(--border);overflow:hidden;}
    .logout-btn{width:100%;padding:14px 16px;background:none;border:none;font-size:14px;font-weight:600;font-family:'Poppins',sans-serif;color:#e63950;cursor:pointer;text-align:left;transition:background .15s;}
    .logout-btn:hover{background:#fff5f5;}
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <button class="icon-btn" id="backBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="topbar-title">Edit Profile</span>
    <button class="save-btn" id="saveBtn">Save</button>
  </div>
</header>

<main class="main">
<div class="page-body">

  <!-- COVER -->
  <div class="cover-wrap" id="coverWrap">
    <div class="cover-photo" id="coverPhoto">
      <div class="cover-overlay">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Change Cover
      </div>
    </div>
    <input type="file" id="coverInput" accept="image/*" style="display:none"/>
  </div>

  <!-- PROFILE PIC -->
  <div class="pic-row">
    <div class="profile-pic-edit" id="profilePicEdit">
      <svg class="default-av" width="48" height="48" viewBox="0 0 24 24" fill="#c0c0c0"><path d="M12 12c2.67 0 8 1.34 8 4v2H4v-2c0-2.66 5.33-4 8-4zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
      <div class="pic-overlay">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
    </div>
    <input type="file" id="picInput" accept="image/*" style="display:none"/>
  </div>

  <div class="sections">

    <!-- BOX 1: Name · Username · Bio -->
    <div class="form-box">
      <div class="field-row">
        <span class="row-label">Name</span>
        <input class="row-input" type="text" id="nameInput" placeholder="Your name" autocomplete="name"/>
      </div>
      <div class="row-divider"></div>
      <div class="field-row">
        <span class="row-label">Username</span>
        <input class="row-input" type="text" id="usernameInput" placeholder="@username" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="row-divider"></div>
      <div class="field-row bio-row">
        <div class="bio-top">
          <span class="bio-label">Bio</span>
          <span class="word-count"><span id="bioWords">0</span>/150 words</span>
        </div>
        <textarea class="bio-input" id="bioInput" rows="3" placeholder="Write something about yourself…"></textarea>
      </div>
    </div>

    <!-- BOX 2: Location (OSM) · Profession -->
    <div class="form-box">
      <!-- Location with OSM autocomplete -->
      <div class="field-row">
        <span class="row-label">Location</span>
        <div class="loc-group">
          <span class="loc-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </span>
          <input class="row-input" type="text" id="locationInput"
                 placeholder="Search location…" autocomplete="off"/>
          <!-- Suggestions dropdown -->
          <div class="loc-suggestions" id="locSuggestions" style="display:none"></div>
        </div>
      </div>
      <div class="row-divider"></div>
      <div class="field-row">
        <span class="row-label">Profession</span>
        <input class="row-input" type="text" id="professionInput" placeholder="What you do"/>
      </div>
    </div>

    <!-- BOX 3: Links -->
    <p class="section-label">Links</p>
    <div class="form-box" id="linksBox">
      <div id="linksList"></div>
      <div class="add-link-row" id="addLinkRow">
        <button class="add-link-btn" id="addLinkBtn">+ Add link</button>
        <input class="link-inline-input" type="url" id="linkUrlInput" placeholder="Paste a link…" autocomplete="off"/>
      </div>
    </div>

    <!-- BOX 4: Preference -->
    <p class="section-label">Preference</p>
    <div class="form-box">
      <!-- Email (read-only) -->
      <div class="field-row">
        <span class="row-label">Email</span>
        <span class="email-val" id="emailDisplay">—</span>
      </div>
      <div class="row-divider"></div>
      <!-- Push Notification -->
      <div class="field-row">
        <span class="row-label">Notification</span>
        <div class="toggle-wrap">
          <span class="toggle-sub">Push Notification</span>
          <label class="t-switch">
            <input type="checkbox" id="notifToggle"/>
            <span class="t-knob"></span>
          </label>
        </div>
      </div>
      <div class="row-divider"></div>
      <!-- Private account -->
      <div class="field-row">
        <span class="row-label">Private account</span>
        <div class="toggle-wrap">
          <label class="t-switch">
            <input type="checkbox" id="privateToggle"/>
            <span class="t-knob"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- LOGOUT BOX -->
    <div class="form-box logout-box">
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

  </div>
</div>
</main>

<script type="module">
  import { auth, db, uploadToCloudinary } from "./config.js";
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
  import { ref, onValue, update } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-database.js";

  const $ = id => document.getElementById(id);

  const backBtn        = $("backBtn");
  const saveBtn        = $("saveBtn");
  const coverWrap      = $("coverWrap");
  const coverPhoto     = $("coverPhoto");
  const coverInput     = $("coverInput");
  const profilePicEdit = $("profilePicEdit");
  const picInput       = $("picInput");
  const nameInput      = $("nameInput");
  const usernameInput  = $("usernameInput");
  const bioInput       = $("bioInput");
  const bioWords       = $("bioWords");
  const locationInput  = $("locationInput");
  const locSuggestions = $("locSuggestions");
  const professionInput= $("professionInput");
  const linksList      = $("linksList");
  const addLinkBtn     = $("addLinkBtn");
  const linkUrlInput   = $("linkUrlInput");
  const emailDisplay   = $("emailDisplay");
  const notifToggle    = $("notifToggle");
  const privateToggle  = $("privateToggle");
  const logoutBtn      = $("logoutBtn");

  let currentUser  = null;
  let coverFile    = null;
  let picFile      = null;
  let existingLinks = {};
  let locDebounce   = null;

  // ── Back ────────────────────────────────────────────────
  backBtn.addEventListener("click", () => {
    if (history.length > 1) history.back();
    else window.location.href = "/profile";
  });

  // ── Auth ─────────────────────────────────────────────────
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "/login"; return; }
    currentUser = user;
    emailDisplay.textContent = user.email || "—";
    loadData(user);
  });

  // ── Load data ─────────────────────────────────────────────
  function loadData(user) {
    onValue(ref(db, `users/${user.uid}`), (snap) => {
      const d = snap.val() || {};
      nameInput.value       = d.name        || user.displayName || "";
      usernameInput.value   = (d.username   || "").replace(/^@/, "");
      bioInput.value        = d.bio         || "";
      locationInput.value   = d.address     || d.location || "";
      professionInput.value = d.profession  || "";
      notifToggle.checked   = d.preferences?.pushNotification ?? false;
      privateToggle.checked = d.isPrivate   ?? false;
      updateWordCount();

      if (d.coverPhotoUrl) renderCoverPreview(d.coverPhotoUrl);
      const ph = d.profilePhotoUrl || user.photoURL || "";
      if (ph) renderPicPreview(ph);

      existingLinks = d.links || {};
      renderLinks();
    }, { onlyOnce: true });
  }

  // ── Cover ─────────────────────────────────────────────────
  coverWrap.addEventListener("click", () => coverInput.click());
  coverInput.addEventListener("change", () => {
    const f = coverInput.files[0]; if (!f) return;
    coverFile = f; renderCoverPreview(URL.createObjectURL(f));
  });
  function renderCoverPreview(src) {
    coverPhoto.innerHTML = `<img src="${esc(src)}" alt="Cover">
      <div class="cover-overlay">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Change Cover</div>`;
  }

  // ── Profile pic ───────────────────────────────────────────
  profilePicEdit.addEventListener("click", () => picInput.click());
  picInput.addEventListener("change", () => {
    const f = picInput.files[0]; if (!f) return;
    picFile = f; renderPicPreview(URL.createObjectURL(f));
  });
  function renderPicPreview(src) {
    profilePicEdit.innerHTML = `<img src="${esc(src)}" alt="Profile">
      <div class="pic-overlay">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>`;
  }

  // ── Bio word count ─────────────────────────────────────────
  bioInput.addEventListener("input", () => {
    const t = bioInput.value.trim();
    const w = t === "" ? [] : t.split(/\s+/);
    if (w.length > 150) bioInput.value = w.slice(0, 150).join(" ");
    updateWordCount();
  });
  function updateWordCount() {
    const t = bioInput.value.trim();
    bioWords.textContent = t === "" ? 0 : t.split(/\s+/).length;
  }

  // ── Location — Photon (OpenStreetMap) ───────────────────
  locationInput.addEventListener("input", () => {
    clearTimeout(locDebounce);
    const q = locationInput.value.trim();
    if (q.length < 2) { hideSuggestions(); return; }
    locDebounce = setTimeout(() => fetchLocations(q), 400);
  });

  locationInput.addEventListener("blur", () => {
    setTimeout(hideSuggestions, 200);
  });

  async function fetchLocations(q) {
    locSuggestions.style.display = "block";
    locSuggestions.innerHTML = `<div class="loc-spinner">Searching…</div>`;
    try {
      const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=6&lang=en`;
      const res  = await fetch(url);
      const data = await res.json();
      const features = data.features || [];

      if (!features.length) {
        locSuggestions.innerHTML = `<div class="loc-spinner">No results found</div>`;
        return;
      }

      locSuggestions.innerHTML = "";
      features.forEach(f => {
        const p    = f.properties || {};
        const name = buildLocName(p);
        if (!name) return;

        const div  = document.createElement("div");
        div.className   = "loc-item";
        div.textContent = name;
        div.addEventListener("mousedown", (e) => {
          e.preventDefault();
          locationInput.value = name;
          hideSuggestions();
        });
        locSuggestions.appendChild(div);
      });
    } catch (err) {
      console.error("Location search error:", err);
      locSuggestions.innerHTML = `<div class="loc-spinner">Could not fetch results</div>`;
    }
  }

  function buildLocName(p) {
    const parts = [];
    if (p.name)                                  parts.push(p.name);
    if (p.city    && p.city    !== p.name)       parts.push(p.city);
    if (p.state   && p.state   !== p.city)       parts.push(p.state);
    if (p.country)                               parts.push(p.country);
    return parts.join(", ");
  }

  function hideSuggestions() {
    locSuggestions.style.display = "none";
    locSuggestions.innerHTML = "";
  }

  // ── Links ─────────────────────────────────────────────────
  const PLATFORMS = [
    { match:["facebook.com","fb.com"],  name:"Facebook",  svg:`<svg viewBox="0 0 24 24" width="22" height="22" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>` },

  const GENERIC_SVG = `<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;

  function detectPlatform(url) {
    try {
      const h = new URL(url).hostname.toLowerCase();
      for (const p of PLATFORMS) { if (p.match.some(m => h.includes(m))) return p; }
    } catch {}
    return { name:"Link", svg: GENERIC_SVG };
  }

  function renderLinks() {
    linksList.innerHTML = "";
    const keys = Object.keys(existingLinks);
    keys.forEach((key, i) => {
      const link = existingLinks[key];
      const p = detectPlatform(link.url);
      if (i > 0) {
        const hr = document.createElement("div");
        hr.className = "row-divider"; hr.style.margin = "0 16px";
        linksList.appendChild(hr);
      }
      const row = document.createElement("div");
      row.className = "link-item";
      row.innerHTML = `
        <div class="link-platform">
          <span class="link-icon">${p.svg}</span>
          <span class="link-platform-name">${esc(p.name)}</span>
        </div>
        <a class="link-url" href="${esc(link.url)}" target="_blank" rel="noopener">${shortUrl(link.url)}</a>
        <button class="link-delete" title="Remove">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>`;
      row.querySelector(".link-delete").addEventListener("click", () => {
        delete existingLinks[key]; renderLinks();
      });
      linksList.appendChild(row);
    });
    $("addLinkRow").style.borderTop = keys.length > 0 ? "1px solid var(--border)" : "none";
  }

  function shortUrl(url) {
    try { return new URL(url).hostname.replace("www.", ""); } catch { return url; }
  }

  addLinkBtn.addEventListener("click", addLink);
  linkUrlInput.addEventListener("keydown", e => { if (e.key === "Enter") addLink(); });
  function addLink() {
    let url = linkUrlInput.value.trim();
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;
    existingLinks["link_" + Date.now()] = { url };
    renderLinks();
    linkUrlInput.value = "";
  }

  // ── Cover / Pic helpers already defined above ─────────────

  // ── Logout ───────────────────────────────────────────────
  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "/login";
  });

  // ── Save ──────────────────────────────────────────────────
  saveBtn.addEventListener("click", async () => {
    saveBtn.classList.add("loading"); saveBtn.disabled = true;
    try {
      const updates = {
        name:       nameInput.value.trim(),
        username:   usernameInput.value.trim().replace(/^@/, ""),
        bio:        bioInput.value.trim(),
        address:    locationInput.value.trim(),
        profession: professionInput.value.trim(),
        isPrivate:  privateToggle.checked,
        "preferences/pushNotification": notifToggle.checked,
        links: Object.keys(existingLinks).length ? existingLinks : null,
      };
      if (coverFile) {
        const { url } = await uploadToCloudinary(coverFile, "covers");
        updates.coverPhotoUrl = url;
      }
      if (picFile) {
        const { url } = await uploadToCloudinary(picFile, "avatars");
        updates.profilePhotoUrl = url;
      }
      await update(ref(db, `users/${currentUser.uid}`), updates);
      saveBtn.classList.remove("loading");
      saveBtn.textContent = "Saved ✓";
      setTimeout(() => window.location.href = "/profile", 900);
    } catch (err) {
      console.error(err);
      saveBtn.classList.remove("loading"); saveBtn.disabled = false;
      saveBtn.textContent = "Save";
      alert("Save failed. Please try again.");
    }
  });

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
