<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SocialFeed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /*  Wrapper  */
    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 44px 28px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /*  Logo  */
    .logo {
      margin-bottom: 26px;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .logo img {
      width: 190px;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /*  Heading  */
    .welcome {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }
    .subtitle {
      font-size: 13px;
      color: #999;
      text-align: center;
      margin-bottom: 26px;
      font-weight: 400;
    }

    /*  Form  */
    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /*  Input group (label + field)  */
    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 500;
      color: #444;
      padding-left: 2px;
    }

    .input-group input {
      width: 100%;
      padding: 9px 13px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      outline: none;
    }

    .input-group input:focus {
      border-color: #8A4FF7;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(138, 79, 247, 0.1);
    }

    .input-group input::placeholder {
      color: #c8c8c8;
    }

    /*  Password wrapper (for eye icon positioning)  */
    .pw-wrap {
      position: relative;
      width: 100%;
    }

    .pw-wrap input {
      padding-right: 48px;
    }

    /*  Password toggle (SVG)  */
    .toggle-pw {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #c0c0c0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      line-height: 0;
    }
    .toggle-pw:hover { color: #8A4FF7; }
    .toggle-pw svg   { display: block; }

    /*  Forgot password  */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -2px;
    }

    .forgot-link {
      font-size: 12.5px;
      color: #8A4FF7;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .forgot-link:hover { opacity: 0.75; text-decoration: underline; }

    /*  Error message  */
    .error-msg {
      display: none;
      color: #d63b3b;
      font-size: 13px;
      text-align: center;
      padding: 10px 14px;
      background: #fff5f5;
      border: 1.5px solid #ffd0d0;
      border-radius: 10px;
      font-weight: 500;
    }

    /*  Login button  */
    .login-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(to right, #6C3EF4, #8A4FF7, #A65CF8);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      margin-top: 2px;
      position: relative;
      letter-spacing: 0.2px;
    }

    .login-btn:hover:not(:disabled) {
      opacity: 0.91;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108, 62, 244, 0.28);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    /* Loading spinner inside button */
    .login-btn.loading { color: transparent; }

    .login-btn.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255, 255, 255, 0.35);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /*  Sign up link  */
    .signup-text {
      font-size: 13px;
      color: #999;
      text-align: center;
      margin-top: 18px;
    }

    .signup-text a {
      color: #8A4FF7;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .signup-text a:hover { opacity: 0.8; text-decoration: underline; }

    /*  Illustration — full width  */
    .illustration {
      width: 100%;
      margin-top: 80px;
      line-height: 0;
    }

    .illustration img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /*  Mobile  */
    @media (max-width: 480px) {
      .wrapper  { padding: 34px 20px 0; }
      .welcome  { font-size: 20px; }
      .logo img { width: 165px; }
    }
  </style>
</head>
<body>

  <!--  Main wrapper  -->
  <div class="wrapper">

    <!-- Logo -->
    <div class="logo">
      <img
        src="https://i.ibb.co/67rjXd2D/file-0000000035747207811bfdf654b4a6ef-1.jpg"
        alt="SocialFeed Logo"
        draggable="false"
      />
    </div>

    <!-- Heading -->
    <h1 class="welcome">Welcome back!</h1>
    <p class="subtitle">Log in to continue your journey</p>

    <!-- Form -->
    <div class="form">

      <!-- Email -->
      <div class="input-group">
        <label class="input-label" for="emailInput">Email</label>
        <input
          type="email"
          id="emailInput"
          placeholder="Enter your email"
          autocomplete="email"
          inputmode="email"
        />
      </div>

      <!-- Password -->
      <div class="input-group">
        <label class="input-label" for="passwordInput">Password</label>
        <div class="pw-wrap">
          <input
            type="password"
            id="passwordInput"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password">
            <!-- Eye icon (default: password hidden) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg"></div>

      <!-- Forgot password -->
      <div class="forgot-row">
        <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
      </div>

      <!-- Login button -->
      <button class="login-btn" id="loginBtn">Log In</button>

    </div>

    <!-- Sign up -->
    <p class="signup-text">
      Don't have an account? <a href="/signup">Sign up</a>
    </p>

  </div>

  <!-- Illustration — full width -->
  <div class="illustration">
    <img
      src="https://i.ibb.co.com/DyV9tDW/file-00000000dfb871faa658852ecbb02a4b-1-removebg-preview.png"
      alt="Illustration"
      draggable="false"
    />
  </div>


  <!--  Firebase Logic (ES Module)  -->
  <script type="module">
    import { auth } from "./config.js";
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

    const emailInput    = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn      = document.getElementById("loginBtn");
    const errorMsg      = document.getElementById("errorMsg");
    const togglePw      = document.getElementById("togglePw");

    //  SVG icons 
    const EYE_ICON = `
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>`;

    const EYE_OFF_ICON = `
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                 a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1
                 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19
                 m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>`;

    //  Already logged in  redirect 
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "/";
    });

    //  Password show / hide 
    togglePw.addEventListener("click", () => {
      const hidden = passwordInput.type === "password";
      passwordInput.type   = hidden ? "text" : "password";
      togglePw.innerHTML   = hidden ? EYE_OFF_ICON : EYE_ICON;
      togglePw.setAttribute("aria-label", hidden ? "Hide password" : "Show password");
    });

    //  Error helpers 
    function showError(msg) {
      errorMsg.textContent   = msg;
      errorMsg.style.display = "block";
    }
    function clearError() {
      errorMsg.textContent   = "";
      errorMsg.style.display = "none";
    }

    function friendlyError(code) {
      const map = {
        "auth/invalid-email":          "Please enter a valid email address.",
        "auth/user-not-found":         "No account found with this email.",
        "auth/wrong-password":         "Incorrect password. Please try again.",
        "auth/invalid-credential":     "Incorrect email or password.",
        "auth/too-many-requests":      "Too many attempts. Please try again later.",
        "auth/network-request-failed": "Network error. Check your connection.",
        "auth/user-disabled":          "This account has been disabled."
      };
      return map[code] || "Login failed. Please try again.";
    }

    //  Login handler 
    async function handleLogin() {
      clearError();

      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email)    { showError("Please enter your email.");    return; }
      if (!password) { showError("Please enter your password."); return; }

      loginBtn.classList.add("loading");
      loginBtn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "/";
      } catch (err) {
        showError(friendlyError(err.code));
        loginBtn.classList.remove("loading");
        loginBtn.disabled = false;
      }
    }

    loginBtn.addEventListener("click", handleLogin);

    [emailInput, passwordInput].forEach((el) => {
      el.addEventListener("keydown", (e) => { if (e.key === "Enter") handleLogin(); });
      el.addEventListener("input",   clearError);
    });
  </script>

</body>
</html>
