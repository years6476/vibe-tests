l;let callStatusOffs=[], callTimerInterval=null, isMuted=false, isCamOff=false;const callOverlayEl=document.getElementById('call-overlay');const remoteVideoEl=document.getElementById('remote-video');const localVideoEl=document.getElementById('local-video');const callAvatarEl=document.getElementById('call-avatar');const callNameEl=document.getElementById('call-name');const callStatusEl=document.getElementById('call-status');const callMuteBtn=document.getElementById('call-mute-btn');const callCamBtn=document.getElementById('call-cam-btn');function setCallUI(peer, type, status, mode) { callAvatarEl.src=peer.photo||defaultAvatar(peer.name); callNameEl.textContent=peer.nickname||peer.name; callStatusEl.textContent=status; callOverlayEl.classList.toggle('video-call',type==='video'); callOverlayEl.classList.toggle('incoming-mode',mode==='incoming'); callCamBtn.style.display=type==='video'?'flex':'none'; callOverlayEl.classList.add('open'); }function closeCallUI() { callOverlayEl.classList.remove('open','video-call','incoming-mode'); remoteVideoEl.srcObject=null; localVideoEl.srcObject=null; }function startCallTimer() { let s=0; stopCallTimer(); callTimerInterval=setInterval(()=>{s++;callStatusEl.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');},1000); }function stopCallTimer() { clearInterval(callTimerInterval); callTimerInterval=null; }function clearCallStatusListeners() { callStatusOffs.forEach(fn=>fn()); callStatusOffs=[]; }function resetCallState() { currentCallId=null;currentCallType=null;currentCallRole=null;currentCallPeer=null;isMuted=false;isCamOff=false;callMuteBtn.classList.remove('active');callCamBtn.classList.remove('active'); }async function startCall(peer, type) {  if (!myUid||!peer||!peer.uid) return;  if (currentCallId) { showToast('একটি কল চলছে'); return; }  try { localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video: type==='video'?{width:480,height:640}:false }); }  catch(e) { showToast('ক্যামেরা/মাইক্রোফোন এক্সেস দিতে হবে'); return; }  currentCallType=type; currentCallRole='caller'; currentCallPeer=peer;  setCallUI(peer,type,'কল হচ্ছে...','outgoing');  localVideoEl.srcObject=localStream;  pc=new RTCPeerConnection(RTC_CONFIG);  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));  pc.ontrack=e=>{remoteVideoEl.srcObject=e.streams[0];};  pc.onconnectionstatechange=()=>{ if(pc&&['disconnected','failed','closed'].includes(pc.connectionState)) endCall(); };  const csr=push(ref(db,'callSessions')); currentCallId=csr.key;  pc.onicecandidate=e=>{ if(e.candidate) push(ref(db,`callSessions/${currentCallId}/callerCandidates`),e.candidate.toJSON()); };  const offer=await pc.createOffer(); await pc.setLocalDescription(offer);  await set(csr,{callerId:myUid,calleeId:peer.uid,type,status:'ringing',offer:{type:offer.type,sdp:offer.sdp},createdAt:serverTimestamp()});  await set(ref(db,`calls/${peer.uid}`),{callId:currentCallId,role:'callee'});  await set(ref(db,`calls/${myUid}`),{callId:currentCallId,role:'caller'});  const ar=ref(db,`callSessions/${currentCallId}/answer`);  onValue(ar,async s=>{const a=s.val();if(a&&pc&&!pc.currentRemoteDescription){await pc.setRemoteDescription(new RTCSessionDescription(a));startCallTimer();}});  callStatusOffs.push(()=>off(ar));  const ccr=ref(db,`callSessions/${currentCallId}/calleeCandidates`);  onValue(ccr,s=>{s.forEach(c=>{if(pc)pc.addIceCandidate(new RTCIceCandidate(c.val())).catch(()=>{});});});  callStatusOffs.push(()=>off(ccr));  const sr=ref(db,`callSessions/${currentCallId}/status`);  onValue(sr,s=>{if(s.val()==='declined'){showToast('কল প্রত্যাখ্যান করা হয়েছে');endCall(false);}else if(s.val()==='ended')endCall(false);});  callStatusOffs.push(()=>off(sr));}function listenIncomingCalls() {  const mcr=ref(db,`calls/${myUid}`);  onValue(mcr,async s=>{    const d=s.val(); if(!d||d.role!=='callee') return; if(currentCallId) return;    const ss=await get(ref(db,`callSessions/${d.callId}`)); const session=ss.val();    if(!session||session.status!=='ringing') return;    currentCallId=d.callId; currentCallType=session.type; currentCallRole='callee';    const cs=await get(ref(db,`users/${session.callerId}`)); const cd=cs.val()||{};    currentCallPeer={uid:session.callerId,name:cd.displayName||cd.name||'অজানা',photo:cd.photoURL||cd.avatar||cd.photo||''};    setCallUI(currentCallPeer,currentCallType,currentCallType==='video'?'ভিডিও কল আসছে...':'কল আসছে...','incoming');  });}async function acceptCall() {  if(!currentCallId||!currentCallPeer) return;  const ss=await get(ref(db,`callSessions/${currentCallId}`)); const session=ss.val();  if(!session){closeCallUI();resetCallState();return;}  try { localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:currentCallType==='video'?{width:480,height:640}:false}); }  catch(e){showToast('ক্যামেরা/মাইক্রোফোন এক্সেস দিতে হবে');declineCall();return;}  localVideoEl.srcObject=localStream; callOverlayEl.classList.remove('incoming-mode'); callStatusEl.textContent='00:00';  pc=new RTCPeerConnection(RTC_CONFIG);  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));  pc.ontrack=e=>{remoteVideoEl.srcObject=e.streams[0];};  pc.onconnectionstatechange=()=>{if(pc&&['disconnected','failed','closed'].includes(pc.connectionState))endCall();};  pc.onicecandidate=e=>{if(e.candidate)push(ref(db,`callSessions/${currentCallId}/calleeCandidates`),e.candidate.toJSON());};  await pc.setRemoteDescription(new RTCSessionDescription(session.offer));  const ans=await pc.createAnswer(); await pc.setLocalDescription(ans);  await update(ref(db,`callSessions/${currentCallId}`),{answer:{type:ans.type,sdp:ans.sdp},status:'accepted'});  const crc=ref(db,`callSessions/${currentCallId}/callerCandidates`);  onValue(crc,s=>{s.forEach(c=>{if(pc)pc.addIceCandidate(new RTCIceCandidate(c.val())).catch(()=>{});});});  callStatusOffs.push(()=>off(crc));  const sr=ref(db,`callSessions/${currentCallId}/status`);  onValue(sr,s=>{if(s.val()==='ended')endCall(false);}); callStatusOffs.push(()=>off(sr));  startCallTimer();}function declineCall() { if(currentCallId){update(ref(db,`callSessions/${currentCallId}`),{status:'declined'}).catch(()=>{});remove(ref(db,`calls/${myUid}`)).catch(()=>{});} closeCallUI(); resetCallState(); }function endCall(notify=true) {  const cid=currentCallId;  if(notify&&cid) update(ref(db,`callSessions/${cid}`),{status:'ended'}).catch(()=>{});  if(cid){remove(ref(db,`calls/${myUid}`)).catch(()=>{});if(currentCallPeer)remove(ref(db,`calls/${currentCallPeer.uid}`)).catch(()=>{});setTimeout(()=>remove(ref(db,`callSessions/${cid}`)).catch(()=>{}),5000);}  if(pc){pc.close();pc=null;} if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}  clearCallStatusListeners(); stopCallTimer(); closeCallUI(); resetCallState();}callMuteBtn.addEventListener('click',()=>{if(!localStream)return;isMuted=!isMuted;localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);callMuteBtn.classList.toggle('active',isMuted);});callCamBtn.addEventListener('click',()=>{if(!localStream||currentCallType!=='video')return;isCamOff=!isCamOff;localStream.getVideoTracks().forEach(t=>t.enabled=!isCamOff);callCamBtn.classList.toggle('active',isCamOff);});document.getElementById('call-end-btn').addEventListener('click',()=>endCall());document.getElementById('incoming-accept-btn').addEventListener('click',()=>acceptCall());document.getElementById('incoming-decline-btn').addEventListener('click',()=>declineCall());const callBtn=type=>()=>{if(!currentContact){showToast('প্রথমে একটি চ্যাট ওপেন করুন');return;}startCall(currentContact,type);};document.getElementById('chat-audio-call-btn').addEventListener('click',callBtn('audio'));document.getElementById('chat-video-call-btn').addEventListener('click',callBtn('video'));document.getElementById('profile-audio-call-btn').addEventListener('click',callBtn('audio'));document.getElement
